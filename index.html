<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Pro - Gestão Inteligente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background 0.3s, color 0.2s;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
        }

        :root {
            --bg-color: #f9fafb;
            --card-bg: #ffffff;
            --text-color: #111827;
            --border-color: #e5e7eb;
            --header-bg: #ffffff;
            --button-bg: #f3f4f6;
            --button-hover: #e5e7eb;
            --sidebar-bg: #ffffff;
            --login-overlay-bg: rgba(0,0,0,0.7);
            --login-card-bg: #ffffff;
            --input-border: #d1d5db;
            --backdrop-bg: rgba(0,0,0,0.4);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body.dark {
            --bg-color: #1f2937;
            --card-bg: #374151;
            --text-color: #f9fafb;
            --border-color: #4b5563;
            --header-bg: #111827;
            --button-bg: #374151;
            --button-hover: #4b5563;
            --sidebar-bg: #1f2937;
            --login-card-bg: #374151;
            --input-border: #4b5563;
            --backdrop-bg: rgba(0,0,0,0.6);
        }

        /* Login */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--login-overlay-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .login-card {
            background: var(--login-card-bg);
            border-radius: 32px;
            padding: 32px 28px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .login-card h2 { text-align: center; margin-bottom: 24px; }
        .login-card input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border-radius: 28px;
            border: 1px solid var(--input-border);
            background: var(--card-bg);
            color: var(--text-color);
        }
        .login-card button {
            width: 100%;
            padding: 12px;
            margin-top: 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .login-message { text-align: center; margin-top: 12px; font-size: 0.85rem; color: var(--danger); }
        .code-field { display: none; }
        .code-field.visible { display: block; }

        /* App principal */
        .app-container { display: none; }
        .app-container.visible { display: block; }

        /* Cabeçalho */
        .main-header {
            background: var(--header-bg);
            border-radius: 20px;
            padding: 12px 24px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .menu-btn {
            background: var(--button-bg);
            border: none;
            font-size: 28px;
            cursor: pointer;
            width: 48px;
            height: 48px;
            border-radius: 40px;
        }
        .page-title {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            background: var(--button-bg);
            padding: 8px 24px;
            border-radius: 60px;
            flex-grow: 1;
            margin: 0 16px;
        }
        .right-area { display: flex; gap: 20px; align-items: center; }
        .user-area { display: flex; align-items: center; gap: 12px; background: var(--button-bg); padding: 6px 16px; border-radius: 40px; }
        .avatar { width: 38px; height: 38px; background: #3b82f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }
        .theme-toggle, .logout-btn { background: var(--button-bg); border: none; padding: 8px 18px; border-radius: 40px; cursor: pointer; }
        .logout-btn { background: var(--danger); color: white; }

        /* Sidebar off-canvas */
        .sidebar-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--backdrop-bg); z-index: 98; display: none; }
        .sidebar-backdrop.active { display: block; }
        .sidebar {
            position: fixed; top: 0; left: 0; width: 280px; height: 100%;
            background: var(--sidebar-bg); transform: translateX(-100%);
            transition: transform 0.3s; z-index: 99; padding: 80px 0 20px;
            overflow-y: auto; border-right: 1px solid var(--border-color);
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar ul { list-style: none; padding: 0 16px; }
        .sidebar li { margin: 8px 0; padding: 12px 16px; border-radius: 16px; cursor: pointer; }
        .sidebar li:hover { background: var(--button-bg); }

        /* Conteúdo principal */
        .main-content { min-height: 500px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 24px; margin-bottom: 24px; border: 1px solid var(--border-color); }
        .card-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 16px; }
        .grid { display: flex; gap: 20px; flex-wrap: wrap; }
        .stat-card { flex: 1; background: var(--card-bg); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        input, select, button { background: var(--button-bg); border: 1px solid var(--border-color); padding: 8px 12px; border-radius: 12px; color: var(--text-color); }
        button { cursor: pointer; }
        .btn-primary { background: #3b82f6; color: white; border: none; }
        .btn-danger { background: var(--danger); color: white; }
        .alert { background: var(--warning); color: #1f2937; padding: 10px; border-radius: 12px; margin-bottom: 16px; }
        @media (max-width: 640px) { .main-header { flex-direction: column; } .right-area { justify-content: flex-end; } }
    </style>
</head>
<body>

<!-- Login -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2>🔐 Loja Pro</h2>
        <input type="text" id="loginName" placeholder="Nome completo">
        <input type="email" id="loginEmail" placeholder="E-mail">
        <input type="password" id="loginPassword" placeholder="Senha">
        <div id="codeField" class="code-field">
            <input type="text" id="verificationCode" placeholder="Código de verificação">
        </div>
        <button id="doLoginBtn">Enviar código / Verificar</button>
        <div id="loginMessage" class="login-message"></div>
        <div class="switch-mode">🔓 Simulação: o código será exibido em um alerta</div>
    </div>
</div>

<!-- App principal -->
<div id="appContainer" class="app-container">
    <div class="main-header">
        <button class="menu-btn" id="menuToggle">☰</button>
        <div class="page-title">Loja Pro  Gestão Inteligente</div>
        <div class="right-area">
            <div class="user-area"><div class="avatar" id="userAvatar">U</div><span id="userNameDisplay"></span></div>
            <button class="theme-toggle" id="themeToggle">🌙</button>
            <button class="logout-btn" id="logoutBtn">Sair</button>
        </div>
    </div>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <div class="sidebar" id="sidebar">
        <ul>
            <li data-view="dashboard">📊 Dashboard</li>
            <li data-view="estoque">📦 Estoque</li>
            <li data-view="venda">💰 Nova Venda</li>
            <li data-view="relatorioVendas">📈 Relatório de Vendas</li>
            <li data-view="relatorioMensal">📅 Relatório Mensal</li>
            <li data-view="alertas">⚠️ Alertas</li>
            <li data-view="historico">📜 Histórico</li>
        </ul>
    </div>
    <div class="main-content" id="mainContent">
        <!-- Conteúdo dinâmico -->
    </div>
</div>

<script>
    // ---------- SIMULAÇÃO DE ENVIO DE CÓDIGO ----------
    let pendingCode = null;
    let pendingUserData = null;

    // Dados persistentes
    let users = JSON.parse(localStorage.getItem('lojapro_users')) || [];
    let produtos = JSON.parse(localStorage.getItem('lojapro_produtos')) || [];
    let vendas = JSON.parse(localStorage.getItem('lojapro_vendas')) || [];
    let currentSession = JSON.parse(localStorage.getItem('lojapro_session')) || null;

    // Helper para salvar
    function saveAll() {
        localStorage.setItem('lojapro_users', JSON.stringify(users));
        localStorage.setItem('lojapro_produtos', JSON.stringify(produtos));
        localStorage.setItem('lojapro_vendas', JSON.stringify(vendas));
        if (currentSession) localStorage.setItem('lojapro_session', JSON.stringify(currentSession));
        else localStorage.removeItem('lojapro_session');
    }

    // Se não houver produtos iniciais, criar alguns
    if (produtos.length === 0) {
        produtos = [
            { id: 1, nome: "Smartphone X", custo: 800, venda: 1200, estoque: 5, estoqueMin: 3, estoqueMax: 30 },
            { id: 2, nome: "Fone Bluetooth", custo: 50, venda: 120, estoque: 12, estoqueMin: 5, estoqueMax: 50 },
            { id: 3, nome: "Carregador Rápido", custo: 30, venda: 70, estoque: 2, estoqueMin: 4, estoqueMax: 40 }
        ];
        saveAll();
    }

    // ----- LOGIN COM CÓDIGO -----
    const loginOverlay = document.getElementById('loginOverlay');
    const appContainer = document.getElementById('appContainer');
    const loginName = document.getElementById('loginName');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const codeField = document.getElementById('codeField');
    const verificationCodeInput = document.getElementById('verificationCode');
    const doLoginBtn = document.getElementById('doLoginBtn');
    const loginMsg = document.getElementById('loginMessage');
    let loginStep = 1; // 1: enviar credenciais, 2: verificar código

    doLoginBtn.addEventListener('click', () => {
        if (loginStep === 1) {
            const name = loginName.value.trim();
            const email = loginEmail.value.trim();
            const password = loginPassword.value.trim();
            if (!name || !email || !password) {
                loginMsg.textContent = "Preencha todos os campos.";
                return;
            }
            // Verifica se usuário existe ou cria
            let user = users.find(u => u.email === email);
            if (user) {
                if (user.password !== password) {
                    loginMsg.textContent = "Senha incorreta.";
                    return;
                }
            } else {
                user = { name, email, password };
                users.push(user);
                saveAll();
            }
            // Gerar código simulado (6 dígitos)
            pendingCode = Math.floor(100000 + Math.random() * 900000).toString();
            pendingUserData = user;
            alert(`🔐 Código de verificação: ${pendingCode}\n(Simulação de e-mail)`);
            loginMsg.textContent = `Código enviado para ${email}. Digite-o abaixo.`;
            codeField.classList.add('visible');
            doLoginBtn.textContent = "Verificar código";
            loginStep = 2;
        } else {
            const code = verificationCodeInput.value.trim();
            if (code === pendingCode) {
                // Login bem-sucedido
                currentSession = { name: pendingUserData.name, email: pendingUserData.email, avatar: pendingUserData.name.charAt(0).toUpperCase() };
                saveAll();
                updateAppUI();
                loginOverlay.style.display = 'none';
                appContainer.classList.add('visible');
                applyTheme();
                renderCurrentView('dashboard');
                closeSidebar();
            } else {
                loginMsg.textContent = "Código inválido. Tente novamente.";
            }
        }
    });

    function updateAppUI() {
        if (currentSession) {
            document.getElementById('userAvatar').textContent = currentSession.avatar;
            document.getElementById('userNameDisplay').textContent = currentSession.name;
        }
    }

    // Verificar sessão ao carregar
    if (currentSession) {
        loginOverlay.style.display = 'none';
        appContainer.classList.add('visible');
        updateAppUI();
        renderCurrentView('dashboard');
    } else {
        loginOverlay.style.display = 'flex';
    }

    // Logout
    document.getElementById('logoutBtn').addEventListener('click', () => {
        currentSession = null;
        saveAll();
        loginStep = 1;
        loginName.value = loginEmail.value = loginPassword.value = verificationCodeInput.value = '';
        codeField.classList.remove('visible');
        doLoginBtn.textContent = "Enviar código / Verificar";
        loginMsg.textContent = "";
        loginOverlay.style.display = 'flex';
        appContainer.classList.remove('visible');
    });

    // ----- MENU SANDUÍCHE (off-canvas) -----
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const sidebarBackdrop = document.getElementById('sidebarBackdrop');
    function openSidebar() { sidebar.classList.add('open'); sidebarBackdrop.classList.add('active'); menuToggle.innerHTML = '✕'; }
    function closeSidebar() { sidebar.classList.remove('open'); sidebarBackdrop.classList.remove('active'); menuToggle.innerHTML = '☰'; }
    function toggleSidebar() { if (sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); }
    menuToggle.addEventListener('click', toggleSidebar);
    sidebarBackdrop.addEventListener('click', closeSidebar);

    // Navegação pelos itens do menu
    document.querySelectorAll('.sidebar li').forEach(item => {
        item.addEventListener('click', () => {
            const view = item.getAttribute('data-view');
            if (view) renderCurrentView(view);
            closeSidebar();
        });
    });

    // ----- RENDERIZAÇÃO DAS TELAS -----
    function renderCurrentView(view) {
        const main = document.getElementById('mainContent');
        if (view === 'dashboard') renderDashboard(main);
        else if (view === 'estoque') renderEstoque(main);
        else if (view === 'venda') renderVenda(main);
        else if (view === 'relatorioVendas') renderRelatorioVendas(main);
        else if (view === 'relatorioMensal') renderRelatorioMensal(main);
        else if (view === 'alertas') renderAlertas(main);
        else if (view === 'historico') renderHistorico(main);
    }

    // DASHBOARD
    function renderDashboard(container) {
        const totalVendas = vendas.reduce((acc, v) => acc + v.total, 0);
        const totalProdutos = produtos.length;
        const baixoEstoque = produtos.filter(p => p.estoque <= p.estoqueMin).length;
        const lucroTotal = vendas.reduce((acc, venda) => {
            const prod = produtos.find(p => p.id === venda.produtoId);
            if (prod) return acc + (venda.quantidade * (prod.venda - prod.custo));
            return acc;
        }, 0);
        const ultimasVendas = [...vendas].reverse().slice(0, 5);
        container.innerHTML = `
            <div class="grid">
                <div class="stat-card"><h3>💰 Faturamento</h3><p style="font-size:2rem">R$ ${totalVendas.toFixed(2)}</p></div>
                <div class="stat-card"><h3>📦 Produtos</h3><p style="font-size:2rem">${totalProdutos}</p></div>
                <div class="stat-card"><h3>⚠️ Estoque baixo</h3><p style="font-size:2rem">${baixoEstoque}</p></div>
                <div class="stat-card"><h3>📈 Lucro Líquido</h3><p style="font-size:2rem">R$ ${lucroTotal.toFixed(2)}</p></div>
            </div>
            <div class="card"><div class="card-title">Últimas vendas</div>
            <table><tr><th>Produto</th><th>Qtd</th><th>Data</th><th>Total</th></tr>
            ${ultimasVendas.map(v => {
                const prod = produtos.find(p => p.id === v.produtoId);
                return `<tr><td>${prod ? prod.nome : '-'}</td><td>${v.quantidade}</td><td>${new Date(v.data).toLocaleDateString()}</td><td>R$ ${v.total.toFixed(2)}</td></tr>`;
            }).join('')}
            </table></div>
        `;
    }

    // ESTOQUE (CRUD com custo, venda, min, max)
    function renderEstoque(container) {
        function renderTable() {
            container.innerHTML = `
                <div class="card"><div class="card-title">📦 Gerenciar Produtos</div>
                <button id="novoProdutoBtn" class="btn-primary" style="margin-bottom:16px">+ Novo Produto</button>
                <table id="tabelaEstoque"><tr><th>Nome</th><th>Custo</th><th>Venda</th><th>Estoque</th><th>Mín</th><th>Máx</th><th>Ações</th></tr>
                ${produtos.map(p => `
                    <tr>
                        <td>${p.nome}</td><td>R$ ${p.custo}</td><td>R$ ${p.venda}</td>
                        <td>${p.estoque}</td><td>${p.estoqueMin}</td><td>${p.estoqueMax}</td>
                        <td><button class="editarProduto" data-id="${p.id}">✏️</button> <button class="deletarProduto" data-id="${p.id}">🗑️</button></td>
                    </tr>
                `).join('')}</table></div>
            `;
            document.getElementById('novoProdutoBtn')?.addEventListener('click', () => openProdutoModal());
            document.querySelectorAll('.editarProduto').forEach(btn => btn.addEventListener('click', (e) => openProdutoModal(parseInt(e.target.dataset.id))));
            document.querySelectorAll('.deletarProduto').forEach(btn => btn.addEventListener('click', (e) => {
                if(confirm('Remover produto?')) {
                    produtos = produtos.filter(p => p.id != e.target.dataset.id);
                    saveAll();
                    renderEstoque(container);
                }
            }));
        }
        function openProdutoModal(id = null) {
            const prod = id ? produtos.find(p => p.id === id) : { nome: '', custo: 0, venda: 0, estoque: 0, estoqueMin: 0, estoqueMax: 0 };
            const nomeForm = prompt('Nome:', prod.nome);
            if (!nomeForm) return;
            const custo = parseFloat(prompt('Custo (R$):', prod.custo));
            const venda = parseFloat(prompt('Venda (R$):', prod.venda));
            const estoque = parseInt(prompt('Estoque atual:', prod.estoque));
            const min = parseInt(prompt('Estoque mínimo:', prod.estoqueMin));
            const max = parseInt(prompt('Estoque máximo:', prod.estoqueMax));
            if (isNaN(custo) || isNaN(venda) || isNaN(estoque) || isNaN(min) || isNaN(max)) return;
            if (id) {
                prod.nome = nomeForm; prod.custo = custo; prod.venda = venda; prod.estoque = estoque; prod.estoqueMin = min; prod.estoqueMax = max;
            } else {
                const newId = Date.now();
                produtos.push({ id: newId, nome: nomeForm, custo, venda, estoque, estoqueMin: min, estoqueMax: max });
            }
            saveAll();
            renderTable();
        }
        renderTable();
    }

    // NOVA VENDA
    function renderVenda(container) {
        container.innerHTML = `<div class="card"><div class="card-title">💰 Registrar Venda</div>
            <select id="produtoVenda"><option value="">Selecione</option>${produtos.map(p => `<option value="${p.id}" data-preco="${p.venda}" data-estoque="${p.estoque}">${p.nome} - R$ ${p.venda} (Estoque: ${p.estoque})</option>`).join('')}</select>
            <input type="number" id="qtdVenda" placeholder="Quantidade" min="1" step="1">
            <button id="realizarVendaBtn" class="btn-primary">Vender</button>
            <div id="vendaMsg"></div></div>`;
        document.getElementById('realizarVendaBtn').addEventListener('click', () => {
            const prodId = parseInt(document.getElementById('produtoVenda').value);
            const qtd = parseInt(document.getElementById('qtdVenda').value);
            const prod = produtos.find(p => p.id === prodId);
            if (!prodId || !qtd) return alert('Selecione produto e quantidade');
            if (qtd > prod.estoque) return alert('Estoque insuficiente');
            prod.estoque -= qtd;
            const total = qtd * prod.venda;
            vendas.push({ id: Date.now(), produtoId: prodId, quantidade: qtd, total, data: new Date().toISOString() });
            saveAll();
            document.getElementById('vendaMsg').innerHTML = `<div class="alert">Venda realizada! Total: R$ ${total.toFixed(2)}</div>`;
            renderVenda(container);
        });
    }

    // RELATÓRIO DE VENDAS (geral)
    function renderRelatorioVendas(container) {
        container.innerHTML = `<div class="card"><div class="card-title">📈 Relatório de Vendas</div>
            <table><tr><th>Produto</th><th>Qtd</th><th>Data</th><th>Total</th></tr>
            ${vendas.map(v => {
                const prod = produtos.find(p => p.id === v.produtoId);
                return `<tr><td>${prod ? prod.nome : '-'}</td><td>${v.quantidade}</td><td>${new Date(v.data).toLocaleString()}</td><td>R$ ${v.total.toFixed(2)}</td></tr>`;
            }).join('')}
            </table><p><strong>Total Geral: R$ ${vendas.reduce((s,v)=>s+v.total,0).toFixed(2)}</strong></p></div>`;
    }

    // RELATÓRIO MENSAL (agrupado por mês/ano)
    function renderRelatorioMensal(container) {
        const porMes = {};
        vendas.forEach(v => {
            const data = new Date(v.data);
            const chave = `${data.getMonth()+1}/${data.getFullYear()}`;
            if (!porMes[chave]) porMes[chave] = 0;
            porMes[chave] += v.total;
        });
        let html = `<div class="card"><div class="card-title">📅 Relatório Mensal</div><table><tr><th>Mês/Ano</th><th>Faturamento</th></tr>`;
        for (let [mes, total] of Object.entries(porMes)) {
            html += `<tr><td>${mes}</td><td>R$ ${total.toFixed(2)}</td></tr>`;
        }
        html += `</table></div>`;
        container.innerHTML = html;
    }

    // ALERTAS: estoque abaixo do mínimo
    function renderAlertas(container) {
        const alertas = produtos.filter(p => p.estoque <= p.estoqueMin);
        container.innerHTML = `<div class="card"><div class="card-title">⚠️ Alertas de Estoque</div>
            ${alertas.length ? alertas.map(p => `<div class="alert">Produto "${p.nome}" está com ${p.estoque} unidades (mínimo: ${p.estoqueMin})</div>`).join('') : '<p>✅ Nenhum alerta no momento.</p>'}
            </div>`;
    }

    // HISTÓRICO (todas as ações: vendas + alterações de estoque? Vamos mostrar vendas + edições de produto)
    function renderHistorico(container) {
        const historicoItens = [...vendas].reverse().map(v => {
            const prod = produtos.find(p => p.id === v.produtoId);
            return `Venda: ${prod?.nome} - ${v.quantidade} un. - R$ ${v.total} - ${new Date(v.data).toLocaleString()}`;
        });
        container.innerHTML = `<div class="card"><div class="card-title">📜 Histórico de Movimentações</div>
            <ul>${historicoItens.map(h => `<li>📌 ${h}</li>`).join('')}</ul>
            ${historicoItens.length === 0 ? '<p>Nenhuma movimentação registrada.</p>' : ''}
            </div>`;
    }

    // Tema escuro/claro
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    function applyTheme() {
        const isDark = localStorage.getItem('theme') === 'dark';
        if (isDark) body.classList.add('dark');
        else body.classList.remove('dark');
        themeToggle.innerHTML = isDark ? '☀️' : '🌙';
    }
    themeToggle.addEventListener('click', () => {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        themeToggle.innerHTML = isDark ? '☀️' : '🌙';
    });
    applyTheme();

    // Inicializar
    if (currentSession) renderCurrentView('dashboard');
</script>
</body>
</html>
