<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Loja Pro - Gestão Inteligente Premium</title>
    <!-- Google Fonts + Font Awesome + Chart.js -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            padding: 24px;
            transition: background 0.3s, color 0.2s;
        }

        /* Temas premium */
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fc 0%, #eef2f8 100%);
            --card-bg: rgba(255,255,255,0.96);
            --text-color: #1e293b;
            --border-color: #e2e8f0;
            --header-bg: rgba(255,255,255,0.85);
            --sidebar-bg: #ffffff;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #8b5cf6;
            --shadow-sm: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
            --shadow-md: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.02);
            --backdrop-bg: rgba(0,0,0,0.3);
            --menu-icon-color: #1e293b;  /* cor padrão do ícone do menu (claro) */
        }

        body.dark {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #1e293b;
            --text-color: #e2e8f0;
            --border-color: #334155;
            --header-bg: #1e293bcc;
            --sidebar-bg: #0f172a;
            --shadow-sm: 0 10px 25px -5px rgba(0,0,0,0.3);
            --backdrop-bg: rgba(0,0,0,0.6);
            --menu-icon-color: #ffffff;  /* tracinhos brancos no escuro */
        }

        /* Login premium */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .login-card {
            background: var(--card-bg);
            border-radius: 40px;
            padding: 40px;
            width: 90%;
            max-width: 460px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }
        .login-card h2 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--info));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 24px;
        }
        .login-card input {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            border-radius: 60px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            transition: 0.2s;
        }
        .login-card input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .login-card button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }
        .login-card button:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .code-field { display: none; margin-top: 12px; }
        .code-field.visible { display: block; }

        /* App principal */
        .app-container { display: none; }
        .app-container.visible { display: block; }

        /* Header */
        .main-header {
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 12px 28px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }
        .menu-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            font-size: 24px;
            cursor: pointer;
            width: 48px;
            height: 48px;
            border-radius: 40px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--menu-icon-color);
        }
        .page-title {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--info));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            flex-grow: 1;
            text-align: center;
        }
        .right-area { display: flex; gap: 16px; align-items: center; }
        .user-area {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card-bg);
            padding: 6px 20px 6px 12px;
            border-radius: 60px;
            border: 1px solid var(--border-color);
        }
        .avatar {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--primary), var(--info));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        .theme-toggle, .logout-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
        }
        .logout-btn { background: var(--danger); color: white; border: none; }

        /* Sidebar off-canvas */
        .sidebar-backdrop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--backdrop-bg); z-index: 98; display: none;
        }
        .sidebar-backdrop.active { display: block; }
        .sidebar {
            position: fixed; top: 0; left: 0; width: 300px; height: 100%;
            background: var(--sidebar-bg); transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 99; padding: 100px 0 32px;
            border-right: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar ul { list-style: none; padding: 0 20px; }
        .sidebar li {
            margin: 12px 0;
            padding: 14px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 1rem;
        }
        .sidebar li:hover { background: var(--primary); color: white; transform: translateX(8px); }
        .sidebar li i { width: 24px; }

        /* Conteúdo principal -> estilo premium */
        .main-content { min-height: 600px; }
        .card-premium {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 28px;
            margin-bottom: 28px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card-premium:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }
        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: 0.2s;
        }
        .stat-card i { font-size: 2.5rem; color: var(--primary); margin-bottom: 12px; }
        .stat-card h3 { font-size: 1rem; font-weight: 500; opacity: 0.8; }
        .stat-card p { font-size: 2rem; font-weight: 700; margin-top: 8px; }
        .charts-row {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            margin-bottom: 32px;
        }
        .chart-box {
            flex: 1;
            min-width: 280px;
            background: var(--card-bg);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th { font-weight: 600; color: var(--primary); }
        button, input, select {
            font-family: 'Inter', sans-serif;
        }
        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:hover { background: var(--primary-dark); transform: scale(1.02); }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-success { background: var(--success); color: white; }
        .badge-warning { background: var(--warning); color: #1e293b; }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
        }
        .flex-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        @media (max-width: 700px) {
            body { padding: 16px; }
            .main-header { flex-direction: column; align-items: stretch; }
            .right-area { justify-content: flex-end; }
        }
    </style>
</head>
<body>

<!-- Login -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2><i class="fas fa-store"></i> Loja Pro</h2>
        <input type="text" id="loginName" placeholder="Nome completo">
        <input type="email" id="loginEmail" placeholder="E-mail">
        <input type="password" id="loginPassword" placeholder="Senha">
        <div id="codeField" class="code-field">
            <input type="text" id="verificationCode" placeholder="Código de 6 dígitos">
        </div>
        <button id="doLoginBtn">Enviar código</button>
        <div id="loginMessage" class="login-message" style="margin-top:16px; font-size:0.8rem;"></div>
        <div style="text-align:center; margin-top:20px; opacity:0.7;"><i class="fas fa-envelope"></i> Simulação: código via alerta</div>
    </div>
</div>

<div id="appContainer" class="app-container">
    <div class="main-header">
        <button class="menu-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="page-title"><i class="fas fa-chart-line"></i> Loja Pro • Gestão Inteligente</div>
        <div class="right-area">
            <div class="user-area"><div class="avatar" id="userAvatar">U</div><span id="userNameDisplay"></span></div>
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
    </div>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <div class="sidebar" id="sidebar">
        <ul>
            <li data-view="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</li>
            <li data-view="estoque"><i class="fas fa-boxes"></i> Estoque</li>
            <li data-view="venda"><i class="fas fa-cash-register"></i> Nova Venda</li>
            <li data-view="relatorioVendas"><i class="fas fa-chart-bar"></i> Relatório Vendas</li>
            <li data-view="relatorioMensal"><i class="fas fa-calendar-alt"></i> Relatório Mensal</li>
            <li data-view="alertas"><i class="fas fa-bell"></i> Alertas</li>
            <li data-view="historico"><i class="fas fa-history"></i> Histórico</li>
            <li data-view="clientes"><i class="fas fa-users"></i> Clientes</li>
        </ul>
    </div>
    <div class="main-content" id="mainContent"></div>
</div>

<script>
    // ---------- DADOS PERSISTENTES ----------
    let users = JSON.parse(localStorage.getItem('lojapro_users')) || [];
    let produtos = JSON.parse(localStorage.getItem('lojapro_produtos')) || [];
    let vendas = JSON.parse(localStorage.getItem('lojapro_vendas')) || [];
    let clientes = JSON.parse(localStorage.getItem('lojapro_clientes')) || [];
    let currentSession = JSON.parse(localStorage.getItem('lojapro_session')) || null;

    function saveAll() {
        localStorage.setItem('lojapro_users', JSON.stringify(users));
        localStorage.setItem('lojapro_produtos', JSON.stringify(produtos));
        localStorage.setItem('lojapro_vendas', JSON.stringify(vendas));
        localStorage.setItem('lojapro_clientes', JSON.stringify(clientes));
        if (currentSession) localStorage.setItem('lojapro_session', JSON.stringify(currentSession));
        else localStorage.removeItem('lojapro_session');
    }

    // Dados iniciais
    if (produtos.length === 0) {
        produtos = [
            { id: 1, nome: "Smartphone X", custo: 800, venda: 1299, estoque: 8, estoqueMin: 3, estoqueMax: 40 },
            { id: 2, nome: "Fone Bluetooth Pro", custo: 45, venda: 149, estoque: 15, estoqueMin: 5, estoqueMax: 60 },
            { id: 3, nome: "Carregador Turbo", custo: 28, venda: 79, estoque: 3, estoqueMin: 4, estoqueMax: 30 },
            { id: 4, nome: "Smartwatch", custo: 150, venda: 299, estoque: 6, estoqueMin: 2, estoqueMax: 25 }
        ];
        saveAll();
    }
    if (vendas.length === 0) {
        vendas = [
            { id: Date.now(), produtoId: 1, quantidade: 2, total: 2598, data: new Date(2025,3,10).toISOString(), clienteId: null, formaPagamento: "Dinheiro" },
            { id: Date.now()+1, produtoId: 2, quantidade: 5, total: 745, data: new Date(2025,3,12).toISOString(), clienteId: null, formaPagamento: "Cartão" }
        ];
        saveAll();
    }
    if (clientes.length === 0) {
        clientes = [
            { id: 1, nome: "João Silva", email: "joao@email.com", telefone: "11999999999" },
            { id: 2, nome: "Maria Oliveira", email: "maria@email.com", telefone: "11988888888" }
        ];
        saveAll();
    }

    // ---------- LOGIN COM CÓDIGO ----------
    let loginStep = 1, pendingCode = null, pendingUserData = null;
    const loginOverlay = document.getElementById('loginOverlay');
    const appContainer = document.getElementById('appContainer');
    const doLoginBtn = document.getElementById('doLoginBtn');
    const loginMsg = document.getElementById('loginMessage');
    const codeField = document.getElementById('codeField');

    doLoginBtn.addEventListener('click', () => {
        if (loginStep === 1) {
            const name = document.getElementById('loginName').value.trim();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            if (!name || !email || !password) { loginMsg.innerText = "Preencha todos os campos"; return; }
            let user = users.find(u => u.email === email);
            if (user && user.password !== password) { loginMsg.innerText = "Senha incorreta"; return; }
            if (!user) {
                user = { name, email, password };
                users.push(user);
                saveAll();
            }
            pendingCode = Math.floor(100000 + Math.random() * 900000).toString();
            pendingUserData = user;
            alert(`📧 Simulação: Seu código é ${pendingCode}`);
            loginMsg.innerText = `Código enviado para ${email}`;
            codeField.classList.add('visible');
            doLoginBtn.innerText = "Verificar código";
            loginStep = 2;
        } else {
            const code = document.getElementById('verificationCode').value.trim();
            if (code === pendingCode) {
                currentSession = { name: pendingUserData.name, email: pendingUserData.email, avatar: pendingUserData.name.charAt(0).toUpperCase() };
                saveAll();
                document.getElementById('userAvatar').innerText = currentSession.avatar;
                document.getElementById('userNameDisplay').innerText = currentSession.name;
                loginOverlay.style.display = 'none';
                appContainer.classList.add('visible');
                applyTheme();
                renderCurrentView('dashboard');
                closeSidebar();
            } else {
                loginMsg.innerText = "Código inválido";
            }
        }
    });

    if (currentSession) {
        loginOverlay.style.display = 'none';
        appContainer.classList.add('visible');
        document.getElementById('userAvatar').innerText = currentSession.avatar;
        document.getElementById('userNameDisplay').innerText = currentSession.name;
        renderCurrentView('dashboard');
    }

    document.getElementById('logoutBtn').addEventListener('click', () => {
        currentSession = null;
        saveAll();
        loginStep = 1;
        document.getElementById('loginName').value = '';
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('verificationCode').value = '';
        codeField.classList.remove('visible');
        doLoginBtn.innerText = "Enviar código";
        loginMsg.innerText = '';
        loginOverlay.style.display = 'flex';
        appContainer.classList.remove('visible');
    });

    // ========== MENU SANDUÍCHE CORRIGIDO ==========
    const menuToggle = document.getElementById('menuToggle');
    const sidebarEl = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebarBackdrop');
    
    function openSidebar() {
        sidebarEl.classList.add('open');
        backdrop.classList.add('active');
        // Troca o ícone de barras para X
        menuToggle.innerHTML = '<i class="fas fa-times"></i>';
    }
    
    function closeSidebar() {
        sidebarEl.classList.remove('open');
        backdrop.classList.remove('active');
        // Troca o ícone de X para barras
        menuToggle.innerHTML = '<i class="fas fa-bars"></i>';
    }
    
    function toggleSidebar() {
        if (sidebarEl.classList.contains('open')) {
            closeSidebar();
        } else {
            openSidebar();
        }
    }
    
    // Evento de clique no botão do menu
    menuToggle.addEventListener('click', toggleSidebar);
    
    // Fechar ao clicar no backdrop
    backdrop.addEventListener('click', closeSidebar);
    
    // Fechar ao clicar em um item do menu
    document.querySelectorAll('.sidebar li').forEach(li => {
        li.addEventListener('click', (e) => {
            const view = li.getAttribute('data-view');
            if(view) renderCurrentView(view);
            closeSidebar();
        });
    });
    // ===========================================

    // Tema escuro/claro
    const themeToggleBtn = document.getElementById('themeToggle');
    const body = document.body;
    function applyTheme() {
        const dark = localStorage.getItem('theme') === 'dark';
        if(dark) body.classList.add('dark');
        else body.classList.remove('dark');
        themeToggleBtn.innerHTML = dark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }
    themeToggleBtn.addEventListener('click', () => {
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        applyTheme();
    });
    applyTheme();

    // ---------- RENDERIZAÇÃO DAS TELAS ----------
    let salesChart = null, topProductsChart = null;
    function renderCurrentView(view) {
        if(view === 'dashboard') renderDashboard();
        else if(view === 'estoque') renderEstoque();
        else if(view === 'venda') renderVenda();
        else if(view === 'relatorioVendas') renderRelatorioVendas();
        else if(view === 'relatorioMensal') renderRelatorioMensal();
        else if(view === 'alertas') renderAlertas();
        else if(view === 'historico') renderHistorico();
        else if(view === 'clientes') renderClientes();
    }

    function renderDashboard() {
        const main = document.getElementById('mainContent');
        const totalFaturamento = vendas.reduce((s,v)=>s+v.total,0);
        const lucroTotal = vendas.reduce((acc, v) => {
            const p = produtos.find(prod => prod.id === v.produtoId);
            return acc + (p ? v.quantidade * (p.venda - p.custo) : 0);
        }, 0);
        const baixoEstoque = produtos.filter(p => p.estoque <= p.estoqueMin).length;
        const vendasPorMes = {};
        vendas.forEach(v => {
            const mes = new Date(v.data).toLocaleString('default', { month: 'short', year:'numeric' });
            vendasPorMes[mes] = (vendasPorMes[mes] || 0) + v.total;
        });
        const labels = Object.keys(vendasPorMes);
        const valores = Object.values(vendasPorMes);
        const qtdPorProduto = {};
        vendas.forEach(v => { qtdPorProduto[v.produtoId] = (qtdPorProduto[v.produtoId] || 0) + v.quantidade; });
        const topProdutos = Object.entries(qtdPorProduto).sort((a,b)=>b[1]-a[1]).slice(0,3);
        const topLabels = topProdutos.map(([id]) => { const p = produtos.find(prod=>prod.id==id); return p ? p.nome : '?'; });
        const topQtde = topProdutos.map(([_,qtd])=>qtd);

        main.innerHTML = `
            <div class="grid-stats">
                <div class="stat-card"><i class="fas fa-chart-line"></i><h3>Faturamento</h3><p>R$ ${totalFaturamento.toFixed(2)}</p></div>
                <div class="stat-card"><i class="fas fa-coins"></i><h3>Lucro Líquido</h3><p>R$ ${lucroTotal.toFixed(2)}</p></div>
                <div class="stat-card"><i class="fas fa-boxes"></i><h3>Produtos em Estoque</h3><p>${produtos.reduce((s,p)=>s+p.estoque,0)}</p></div>
                <div class="stat-card"><i class="fas fa-exclamation-triangle"></i><h3>Alertas Baixo Estoque</h3><p>${baixoEstoque}</p></div>
            </div>
            <div class="charts-row">
                <div class="chart-box"><canvas id="monthlySalesChart" width="400" height="250"></canvas></div>
                <div class="chart-box"><canvas id="topProductsChart" width="400" height="250"></canvas></div>
            </div>
            <div class="card-premium"><div class="card-title"><i class="fas fa-clock"></i> Últimas Vendas</div>
            <table><thead><tr><th>Produto</th><th>Qtd</th><th>Cliente</th><th>Data</th><th>Total</th></tr></thead><tbody>
            ${[...vendas].reverse().slice(0,5).map(v => {
                const p = produtos.find(prod=>prod.id===v.produtoId);
                const cliente = v.clienteId ? clientes.find(c=>c.id===v.clienteId) : null;
                return `<tr><td>${p?p.nome:'-'}</td><td>${v.quantidade}</td><td>${cliente ? cliente.nome : 'Não cadastrado'}</td><td>${new Date(v.data).toLocaleDateString()}</td><td>R$ ${v.total.toFixed(2)}</td></tr>`;
            }).join('')}
            </tbody></table></div>
        `;
        setTimeout(() => {
            const ctx1 = document.getElementById('monthlySalesChart')?.getContext('2d');
            const ctx2 = document.getElementById('topProductsChart')?.getContext('2d');
            if(ctx1) {
                if(salesChart) salesChart.destroy();
                salesChart = new Chart(ctx1, { type: 'bar', data: { labels, datasets: [{ label: 'Faturamento (R$)', data: valores, backgroundColor: '#3b82f6', borderRadius: 12 }] }, options: { responsive: true, maintainAspectRatio: true } });
            }
            if(ctx2) {
                if(topProductsChart) topProductsChart.destroy();
                topProductsChart = new Chart(ctx2, { type: 'doughnut', data: { labels: topLabels, datasets: [{ data: topQtde, backgroundColor: ['#3b82f6','#10b981','#f59e0b'] }] }, options: { responsive: true } });
            }
        }, 50);
    }

    function renderEstoque() {
        const main = document.getElementById('mainContent');
        const html = `
            <div class="card-premium"><div class="card-title"><i class="fas fa-edit"></i> Gestão de Estoque</div>
            <button id="novoProdutoBtn" class="btn-primary" style="margin-bottom:20px"><i class="fas fa-plus"></i> Novo Produto</button>
            <div style="overflow-x:auto">${'<table><thead><tr><th>Produto</th><th>Custo (R$)</th><th>Venda (R$)</th><th>Estoque</th><th>Mín</th><th>Máx</th><th>Ações</th></tr></thead><tbody>' + produtos.map(p => `<tr><td>${p.nome}</td><td>${p.custo}</td><td>${p.venda}</td><td><span class="badge ${p.estoque<=p.estoqueMin?'badge-warning':'badge-success'}">${p.estoque}</span></td><td>${p.estoqueMin}</td><td>${p.estoqueMax}</td><td><button class="editProd" data-id="${p.id}"><i class="fas fa-pen"></i></button> <button class="delProd" data-id="${p.id}"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></table>'}
            </div></div>
        `;
        main.innerHTML = html;
        document.getElementById('novoProdutoBtn')?.addEventListener('click', () => openProdutoModal());
        document.querySelectorAll('.editProd').forEach(btn => btn.addEventListener('click', (e) => openProdutoModal(parseInt(e.target.closest('button').dataset.id))));
        document.querySelectorAll('.delProd').forEach(btn => btn.addEventListener('click', (e) => {
            if(confirm('Excluir produto?')) {
                produtos = produtos.filter(p => p.id != e.target.closest('button').dataset.id);
                saveAll();
                renderEstoque();
            }
        }));
    }
    function openProdutoModal(id = null) {
        const prod = id ? produtos.find(p => p.id===id) : { nome:'', custo:0, venda:0, estoque:0, estoqueMin:0, estoqueMax:0 };
        const nome = prompt('Nome:', prod.nome);
        if(!nome) return;
        const custo = parseFloat(prompt('Custo (R$):', prod.custo));
        const venda = parseFloat(prompt('Venda (R$):', prod.venda));
        const estoque = parseInt(prompt('Estoque:', prod.estoque));
        const min = parseInt(prompt('Estoque mínimo:', prod.estoqueMin));
        const max = parseInt(prompt('Estoque máximo:', prod.estoqueMax));
        if(isNaN(custo)||isNaN(venda)||isNaN(estoque)||isNaN(min)||isNaN(max)) return;
        if(id) {
            prod.nome=nome; prod.custo=custo; prod.venda=venda; prod.estoque=estoque; prod.estoqueMin=min; prod.estoqueMax=max;
        } else {
            produtos.push({ id: Date.now(), nome, custo, venda, estoque, estoqueMin: min, estoqueMax: max });
        }
        saveAll();
        renderEstoque();
    }

    function renderVenda() {
        const main = document.getElementById('mainContent');
        const clientesOptions = clientes.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
        main.innerHTML = `
            <div class="card-premium">
                <div class="card-title"><i class="fas fa-shopping-cart"></i> Nova Venda</div>
                <div class="form-group">
                    <label>Cliente</label>
                    <div class="flex-row">
                        <select id="clienteVenda" style="flex:1">
                            <option value="">-- Selecione um cliente --</option>
                            ${clientesOptions}
                            <option value="novo">+ Novo Cliente</option>
                        </select>
                        <button id="btnNovoClienteRapido" class="btn-primary">Cadastrar</button>
                    </div>
                    <div id="novoClienteFields" style="display:none; margin-top:12px;">
                        <input type="text" id="novoClienteNome" placeholder="Nome do cliente" style="width:100%; margin-bottom:8px; padding:10px; border-radius:60px;">
                        <input type="email" id="novoClienteEmail" placeholder="E-mail" style="width:100%; margin-bottom:8px; padding:10px; border-radius:60px;">
                        <input type="tel" id="novoClienteTelefone" placeholder="Telefone" style="width:100%; margin-bottom:8px; padding:10px; border-radius:60px;">
                        <button id="salvarNovoCliente" class="btn-primary">Salvar Cliente</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Produto</label>
                    <select id="produtoVenda">${produtos.map(p => `<option value="${p.id}" data-venda="${p.venda}" data-estoque="${p.estoque}">${p.nome} - R$ ${p.venda} (estoque: ${p.estoque})</option>`).join('')}</select>
                </div>
                <div class="form-group">
                    <label>Quantidade</label>
                    <input type="number" id="qtdVenda" min="1" value="1">
                </div>
                <div class="form-group">
                    <label>Data da Venda</label>
                    <input type="date" id="dataVenda" value="${new Date().toISOString().slice(0,10)}">
                </div>
                <div class="form-group">
                    <label>Forma de Pagamento</label>
                    <select id="formaPagamento">
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Cartão Crédito">Cartão Crédito</option>
                        <option value="Cartão Débito">Cartão Débito</option>
                        <option value="Pix">Pix</option>
                        <option value="Boleto">Boleto</option>
                    </select>
                </div>
                <button id="venderBtn" class="btn-primary"><i class="fas fa-check"></i> Registrar Venda</button>
                <div id="vendaMsg" style="margin-top:20px;"></div>
            </div>
        `;
        const clienteSelect = document.getElementById('clienteVenda');
        const novoClienteDiv = document.getElementById('novoClienteFields');
        const btnNovo = document.getElementById('btnNovoClienteRapido');
        btnNovo.addEventListener('click', () => {
            novoClienteDiv.style.display = 'block';
        });
        document.getElementById('salvarNovoCliente').addEventListener('click', () => {
            const nome = document.getElementById('novoClienteNome').value.trim();
            const email = document.getElementById('novoClienteEmail').value.trim();
            const telefone = document.getElementById('novoClienteTelefone').value.trim();
            if(!nome) return alert('Nome é obrigatório');
            const novoId = Date.now();
            clientes.push({ id: novoId, nome, email, telefone });
            saveAll();
            const option = new Option(nome, novoId);
            clienteSelect.add(option, 'novo');
            clienteSelect.value = novoId;
            novoClienteDiv.style.display = 'none';
            document.getElementById('novoClienteNome').value = '';
            document.getElementById('novoClienteEmail').value = '';
            document.getElementById('novoClienteTelefone').value = '';
            alert('Cliente cadastrado com sucesso!');
        });

        document.getElementById('venderBtn').addEventListener('click', () => {
            let clienteId = parseInt(document.getElementById('clienteVenda').value);
            if(isNaN(clienteId)) clienteId = null;
            const prodId = parseInt(document.getElementById('produtoVenda').value);
            const qtd = parseInt(document.getElementById('qtdVenda').value);
            const dataVenda = document.getElementById('dataVenda').value;
            const formaPagamento = document.getElementById('formaPagamento').value;
            const prod = produtos.find(p=>p.id===prodId);
            if(!prod || qtd<=0) return alert('Selecione produto e quantidade válida');
            if(qtd > prod.estoque) return alert('Estoque insuficiente');
            prod.estoque -= qtd;
            const total = qtd * prod.venda;
            vendas.push({ id: Date.now(), produtoId: prodId, quantidade: qtd, total, data: new Date(dataVenda).toISOString(), clienteId, formaPagamento });
            saveAll();
            document.getElementById('vendaMsg').innerHTML = `<div class="badge-success" style="padding:12px; border-radius:60px;">✅ Venda realizada! Total R$ ${total.toFixed(2)}</div>`;
            renderVenda();
        });
    }

    function renderRelatorioVendas() {
        const main = document.getElementById('mainContent');
        const totalGeral = vendas.reduce((s,v)=>s+v.total,0);
        main.innerHTML = `<div class="card-premium"><div class="card-title"><i class="fas fa-chart-simple"></i> Relatório de Vendas</div>
            <table><thead><tr><th>Produto</th><th>Qtd</th><th>Cliente</th><th>Data</th><th>Pagamento</th><th>Total</th></tr></thead><tbody>
            ${vendas.map(v => {
                const p = produtos.find(prod=>prod.id===v.produtoId);
                const cliente = v.clienteId ? clientes.find(c=>c.id===v.clienteId) : null;
                return `<tr><td>${p?p.nome:'-'}</td><td>${v.quantidade}</td><td>${cliente ? cliente.nome : 'Não cadastrado'}</td><td>${new Date(v.data).toLocaleString()}</td><td>${v.formaPagamento || '-'}</td><td>R$ ${v.total.toFixed(2)}</td></tr>`;
            }).join('')}
            </tbody></table><div style="margin-top:20px;"><strong>Total Geral: R$ ${totalGeral.toFixed(2)}</strong></div></div>`;
    }

    function renderRelatorioMensal() {
        const porMes = {};
        vendas.forEach(v => {
            const d = new Date(v.data);
            const chave = `${d.getMonth()+1}/${d.getFullYear()}`;
            porMes[chave] = (porMes[chave] || 0) + v.total;
        });
        let html = `<div class="card-premium"><div class="card-title"><i class="fas fa-calendar-week"></i> Relatório Mensal</div><table><thead><tr><th>Mês/Ano</th><th>Faturamento</th></tr></thead><tbody>`;
        for(let [mes, total] of Object.entries(porMes)) html += `<tr><td>${mes}</td><td>R$ ${total.toFixed(2)}</td></tr>`;
        html += `</tbody></table></div>`;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderAlertas() {
        const alertas = produtos.filter(p => p.estoque <= p.estoqueMin);
        document.getElementById('mainContent').innerHTML = `<div class="card-premium"><div class="card-title"><i class="fas fa-bell"></i> Alertas de Estoque</div>
            ${alertas.length ? alertas.map(p => `<div class="badge-warning" style="margin:8px 0; padding:12px; border-radius:60px;">⚠️ ${p.nome} está com ${p.estoque} unid. (mínimo: ${p.estoqueMin})</div>`).join('') : '<p>✅ Nenhum alerta ativo</p>'}</div>`;
    }

    function renderHistorico() {
        const items = [...vendas].reverse().map(v => {
            const p = produtos.find(prod=>prod.id===v.produtoId);
            const cliente = v.clienteId ? clientes.find(c=>c.id===v.clienteId) : null;
            return `<li style="margin-bottom:12px;"><i class="fas fa-receipt"></i> Venda: ${p?.nome} - ${v.quantidade} un - R$ ${v.total} - ${new Date(v.data).toLocaleString()} - Cliente: ${cliente?cliente.nome:'Não cadastrado'} - Pagamento: ${v.formaPagamento}</li>`;
        });
        document.getElementById('mainContent').innerHTML = `<div class="card-premium"><div class="card-title"><i class="fas fa-history"></i> Histórico de Movimentações</div><ul>${items.length?items.join(''):'<li>Nenhuma venda registrada</li>'}</ul></div>`;
    }

    function renderClientes() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `<div class="card-premium"><div class="card-title"><i class="fas fa-users"></i> Cadastro de Clientes</div>
            <button id="novoClienteBtn" class="btn-primary" style="margin-bottom:20px"><i class="fas fa-user-plus"></i> Novo Cliente</button>
            <table><thead><tr><th>Nome</th><th>E-mail</th><th>Telefone</th><th>Ações</th></tr></thead><tbody>
            ${clientes.map(c => `<tr><td>${c.nome}</td><td>${c.email || '-'}<tr><td>${c.telefone || '-'}</td><td><button class="delCliente" data-id="${c.id}"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
            </tbody></table></div>`;
        document.getElementById('novoClienteBtn')?.addEventListener('click', () => {
            const nome = prompt('Nome do cliente:');
            if(nome) {
                const email = prompt('E-mail (opcional):');
                const telefone = prompt('Telefone (opcional):');
                clientes.push({ id: Date.now(), nome, email: email||'', telefone: telefone||'' });
                saveAll();
                renderClientes();
            }
        });
        document.querySelectorAll('.delCliente').forEach(btn => btn.addEventListener('click', (e) => {
            if(confirm('Remover cliente?')) {
                clientes = clientes.filter(c => c.id != e.target.closest('button').dataset.id);
                saveAll();
                renderClientes();
            }
        }));
    }
</script>
</body>
</html>
