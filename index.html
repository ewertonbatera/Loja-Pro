<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Loja Pro - Gestão Inteligente Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* ========== RESET E TEMAS ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-gradient); color: var(--text-color); padding: 24px; transition: background 0.3s, color 0.2s; }
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fc 0%, #eef2f8 100%);
            --card-bg: rgba(255,255,255,0.96);
            --text-color: #1e293b;
            --border-color: #e2e8f0;
            --header-bg: rgba(255,255,255,0.85);
            --sidebar-bg: #ffffff;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #8b5cf6;
            --shadow-sm: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
            --shadow-md: 0 20px 25px -5px rgba(0,0,0,0.05), 0 10px 10px -5px rgba(0,0,0,0.02);
            --backdrop-bg: rgba(0,0,0,0.3);
            --menu-icon-color: #1e293b;
            --input-bg: #ffffff;
        }
        body.dark {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #1e293b;
            --text-color: #e2e8f0;
            --border-color: #334155;
            --header-bg: #1e293bcc;
            --sidebar-bg: #0f172a;
            --shadow-sm: 0 10px 25px -5px rgba(0,0,0,0.3);
            --backdrop-bg: rgba(0,0,0,0.6);
            --menu-icon-color: #ffffff;
            --input-bg: #0f172a;
        }
        /* ========== COMPONENTES ========== */
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-gradient); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .login-card { background: var(--card-bg); border-radius: 48px; padding: 48px 40px; width: 90%; max-width: 480px; box-shadow: var(--shadow-md); border: 1px solid var(--border-color); animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header i { font-size: 3.5rem; background: linear-gradient(135deg, var(--primary), var(--info)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .login-header h2 { font-size: 2rem; font-weight: 700; margin-top: 12px; background: linear-gradient(135deg, var(--primary), var(--info)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--primary); }
        .input-group input { width: 100%; padding: 16px 16px 16px 48px; border-radius: 60px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-color); outline: none; transition: 0.2s; }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        .login-actions { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
        .login-btn, .signup-btn { width: 100%; padding: 14px; font-weight: 600; border-radius: 60px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1rem; transition: 0.2s; border: none; }
        .login-btn { background: var(--primary); color: white; }
        .login-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .signup-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-color); }
        .signup-btn:hover { background: var(--card-bg); transform: translateY(-2px); }
        .login-message { text-align: center; margin-top: 16px; font-size: 0.8rem; color: var(--danger); }
        
        /* App principal */
        .app-container { display: none; }
        .app-container.visible { display: block; }
        .main-header {
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 12px 24px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            flex-wrap: wrap;
        }
        .menu-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            font-size: 22px;
            width: 44px;
            height: 44px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .page-title {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--info));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            flex: 1;
            text-align: center;
            white-space: nowrap;
            overflow-x: auto;
            padding: 0 8px;
        }
        .right-area {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }
        .user-area {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--card-bg);
            padding: 5px 16px 5px 8px;
            border-radius: 60px;
            border: 1px solid var(--border-color);
        }
        .avatar-wrapper {
            position: relative;
            cursor: pointer;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--info));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: var(--primary);
        }
        .avatar-edit-icon {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: var(--primary);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: white;
            border: 2px solid var(--card-bg);
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }
        .avatar-wrapper:hover .avatar-edit-icon {
            opacity: 1;
        }
        .theme-toggle, .logout-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .logout-btn {
            background: var(--danger);
            color: white;
            border: none;
        }
        /* Sidebar */
        .sidebar-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--backdrop-bg); z-index: 98; display: none; }
        .sidebar-backdrop.active { display: block; }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: var(--sidebar-bg);
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 99;
            padding: 20px 0 32px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-header {
            padding: 24px 20px 16px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
            text-align: center;
            position: relative;
        }
        .sidebar-header h2 { font-size: 1.2rem; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--info)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .close-sidebar-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: var(--text-color);
            opacity: 0.7;
            transition: 0.2s;
        }
        .close-sidebar-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }
        .sidebar ul { list-style: none; padding: 0 20px; flex: 1; }
        .sidebar li { margin: 8px 0; padding: 12px 18px; border-radius: 60px; cursor: pointer; display: flex; align-items: center; gap: 14px; transition: 0.2s; font-weight: 500; }
        .sidebar li:hover { background: var(--primary); color: white; transform: translateX(5px); }
        .sidebar li.active { background: var(--primary); color: white; box-shadow: 0 2px 8px rgba(59,130,246,0.3); }
        .main-content { min-height: 600px; }
        .card-premium { background: var(--card-bg); border-radius: 32px; padding: 28px; margin-bottom: 28px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-color); transition: 0.2s; }
        .card-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .stat-card { background: var(--card-bg); border-radius: 28px; padding: 20px; text-align: center; border: 1px solid var(--border-color); transition: 0.2s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
        .stat-card i { font-size: 2rem; color: var(--primary); margin-bottom: 8px; }
        .stat-card p { font-size: 1.4rem; font-weight: 700; margin-top: 8px; word-break: break-word; }
        .stat-card small { font-size: 0.75rem; opacity: 0.7; display: block; margin-top: 4px; }
        .charts-row { display: flex; flex-wrap: wrap; gap: 24px; margin-bottom: 32px; }
        .chart-box { flex: 1; min-width: 280px; background: var(--card-bg); border-radius: 28px; padding: 20px; border: 1px solid var(--border-color); }
        .chart-container { position: relative; height: 280px; width: 100%; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-danger { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 60px; font-size: 0.75rem; font-weight: 600; }
        .badge-success { background: var(--success); color: white; }
        .badge-warning { background: var(--warning); color: #1e293b; }
        .badge-info { background: var(--info); color: white; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 14px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--input-bg); color: var(--text-color); outline: none; transition: 0.2s; font-size: 0.95rem; }
        .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
        .flex-row { display: flex; gap: 16px; flex-wrap: wrap; align-items: flex-end; }
        .flex-row .form-group { flex: 1; min-width: 140px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--backdrop-bg); align-items: center; justify-content: center; z-index: 200; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card-bg); border-radius: 32px; padding: 28px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .table-responsive { overflow-x: auto; border-radius: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { color: var(--primary); font-weight: 600; }
        .search-box { margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; }
        .search-box input { flex: 1; padding: 12px; border-radius: 40px; border: 1px solid var(--border-color); background: var(--input-bg); font-size: 0.9rem; }
        .produto-info-card { background: var(--card-bg); border-radius: 20px; padding: 16px; margin: 16px 0; border: 1px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        @media (max-width: 760px) {
            body { padding: 16px; }
            .main-header {
                flex-direction: column;
                align-items: stretch;
                gap: 12px;
                padding: 16px;
            }
            .page-title {
                text-align: center;
                white-space: normal;
                order: 1;
            }
            .right-area {
                justify-content: flex-end;
                order: 2;
            }
            .menu-btn {
                order: 0;
                width: 40px;
                height: 40px;
                align-self: flex-start;
            }
            .user-area span {
                display: none;
            }
            .user-area {
                padding: 5px 8px;
            }
            .flex-row { flex-direction: column; align-items: stretch; }
            .flex-row .form-group { width: 100%; }
            .card-title { font-size: 1.2rem; }
            .stat-card p { font-size: 1.2rem; }
        }
        @media (max-width: 480px) {
            .right-area { gap: 8px; }
            .theme-toggle span, .logout-btn span { display: none; }
            .theme-toggle, .logout-btn { padding: 8px 12px; }
            .card-premium { padding: 20px; }
        }
    </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <div class="login-header"><i class="fas fa-store"></i><h2>Loja Pro</h2><p>Gestão inteligente para seu negócio</p></div>
        <div class="input-group"><i class="fas fa-user"></i><input type="text" id="loginName" placeholder="Nome completo"></div>
        <div class="input-group"><i class="fas fa-envelope"></i><input type="email" id="loginEmail" placeholder="E-mail"></div>
        <div class="input-group"><i class="fas fa-lock"></i><input type="password" id="loginPassword" placeholder="Senha"></div>
        <div class="login-actions">
            <button id="doLoginBtn" class="login-btn"><i class="fas fa-sign-in-alt"></i> Entrar</button>
            <button id="doSignupBtn" class="signup-btn"><i class="fas fa-user-plus"></i> Criar Conta</button>
        </div>
        <div id="loginMessage" class="login-message"></div>
    </div>
</div>

<!-- APLICATIVO PRINCIPAL -->
<div id="appContainer" class="app-container">
    <div class="main-header">
        <button class="menu-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="page-title"><i class="fas fa-chart-line"></i> Loja Pro • Gestão Inteligente</div>
        <div class="right-area">
            <div class="user-area">
                <div class="avatar-wrapper" id="avatarWrapper">
                    <div class="avatar" id="userAvatar">U</div>
                    <div class="avatar-edit-icon"><i class="fas fa-camera"></i></div>
                </div>
                <span id="userNameDisplay"></span>
                <input type="file" id="avatarUpload" accept="image/*" style="display:none">
            </div>
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i> <span>Modo</span></button>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span>Sair</span></button>
        </div>
    </div>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-chart-line"></i> Loja Pro</h2>
            <p>Gestão Inteligente</p>
            <button class="close-sidebar-btn" id="closeSidebarBtn"><i class="fas fa-times"></i></button>
        </div>
        <ul>
            <li data-view="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</li>
            <li data-view="estoque"><i class="fas fa-boxes"></i> Estoque</li>
            <li data-view="venda"><i class="fas fa-cash-register"></i> Nova Venda</li>
            <li data-view="relatorioVendas"><i class="fas fa-chart-bar"></i> Relatório Vendas</li>
            <li data-view="relatorioMensal"><i class="fas fa-calendar-alt"></i> Relatório Mensal</li>
            <li data-view="alertas"><i class="fas fa-bell"></i> Alertas</li>
            <li data-view="historico"><i class="fas fa-history"></i> Histórico</li>
            <li data-view="clientes"><i class="fas fa-users"></i> Clientes</li>
            <li data-view="configuracoes"><i class="fas fa-cog"></i> Configurações</li>
        </ul>
    </div>
    <div class="main-content" id="mainContent"></div>
</div>

<!-- Modal Produto -->
<div id="produtoModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Novo Produto</h3>
        <div class="form-group"><label>Descrição *</label><input type="text" id="prodNome" placeholder="Ex: Smartphone X"></div>
        <div class="form-group"><label>Código de Barras</label><input type="text" id="prodCodigoBarras" placeholder="1234567890123"></div>
        <div class="form-group"><label>Código Interno</label><input type="text" id="prodCodigoInterno" placeholder="REF-001"></div>
        <div class="form-group"><label>Preço de Compra (R$) *</label><input type="number" id="prodCusto" step="0.01" placeholder="0.00"></div>
        <div class="form-group"><label>Preço de Venda (R$) *</label><input type="number" id="prodVenda" step="0.01" placeholder="0.00"></div>
        <div class="form-group"><label>Estoque Atual *</label><input type="number" id="prodEstoque" step="1" placeholder="0"></div>
        <div class="form-group"><label>Estoque Mínimo *</label><input type="number" id="prodEstoqueMin" step="1" placeholder="0"></div>
        <div class="form-group"><label>Estoque Máximo *</label><input type="number" id="prodEstoqueMax" step="1" placeholder="0"></div>
        <div class="modal-actions"><button id="cancelModalBtn" style="background:var(--danger); color:white; padding:10px 20px; border-radius:40px; border:none;">Cancelar</button><button id="saveProdutoBtn" class="btn-primary">Salvar</button></div>
    </div>
</div>

<script>
    // ========== UTIL ==========
    function formatMoney(value) { if (isNaN(value)) return 'R$ 0,00'; return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value); }
    
    // ========== DADOS PADRÃO (usados apenas na primeira inicialização) ==========
    const DEFAULT_PRODUTOS = [
        { id: 1, nome: "Smartphone X", codigoBarras: "7891234567890", codigoInterno: "SPX-001", custo: 800, venda: 1299, estoque: 8, estoqueMin: 3, estoqueMax: 40 },
        { id: 2, nome: "Fone Bluetooth Pro", codigoBarras: "7891234567891", codigoInterno: "FBP-002", custo: 45, venda: 149, estoque: 15, estoqueMin: 5, estoqueMax: 60 },
        { id: 3, nome: "Carregador Turbo", codigoBarras: "7891234567892", codigoInterno: "CT-003", custo: 28, venda: 79, estoque: 3, estoqueMin: 4, estoqueMax: 30 },
        { id: 4, nome: "Smartwatch", codigoBarras: "7891234567893", codigoInterno: "SW-004", custo: 150, venda: 299, estoque: 6, estoqueMin: 2, estoqueMax: 25 }
    ];
    const DEFAULT_VENDAS = [
        { id: Date.now(), produtoId: 1, quantidade: 2, total: 2598, data: new Date(2025,3,10).toISOString(), clienteId: null, formaPagamento: "Dinheiro", precoUnitario: 1299 },
        { id: Date.now()+1, produtoId: 2, quantidade: 5, total: 745, data: new Date(2025,3,12).toISOString(), clienteId: null, formaPagamento: "Cartão", precoUnitario: 149 },
        { id: Date.now()+2, produtoId: 3, quantidade: 1, total: 79, data: new Date(2025,4,5).toISOString(), clienteId: null, formaPagamento: "Pix", precoUnitario: 79 }
    ];
    const DEFAULT_CLIENTES = [
        { id: 1, nome: "João Silva", email: "joao@email.com", telefone: "11999999999" },
        { id: 2, nome: "Maria Oliveira", email: "maria@email.com", telefone: "11988888888" }
    ];
    
    // Flag para saber se é primeira execução
    const isFirstRun = localStorage.getItem('lojapro_initialized') === null;
    
    // ========== CARREGAR DADOS ==========
    let users = JSON.parse(localStorage.getItem('lojapro_users')) || [];
    let produtos = JSON.parse(localStorage.getItem('lojapro_produtos')) || [];
    let vendas = JSON.parse(localStorage.getItem('lojapro_vendas')) || [];
    let clientes = JSON.parse(localStorage.getItem('lojapro_clientes')) || [];
    let currentSession = JSON.parse(localStorage.getItem('lojapro_session')) || null;

    // Só carrega dados padrão se for primeira execução E não houver dados
    if (isFirstRun) {
        if (produtos.length === 0) produtos = [...DEFAULT_PRODUTOS];
        if (vendas.length === 0) vendas = [...DEFAULT_VENDAS];
        if (clientes.length === 0) clientes = [...DEFAULT_CLIENTES];
        localStorage.setItem('lojapro_initialized', 'true');
        saveAll();
    }

    function saveAll() {
        localStorage.setItem('lojapro_users', JSON.stringify(users));
        localStorage.setItem('lojapro_produtos', JSON.stringify(produtos));
        localStorage.setItem('lojapro_vendas', JSON.stringify(vendas));
        localStorage.setItem('lojapro_clientes', JSON.stringify(clientes));
        if (currentSession) localStorage.setItem('lojapro_session', JSON.stringify(currentSession));
        else localStorage.removeItem('lojapro_session');
    }

    // Função para resetar dados (opcional, via configurações)
    function resetToDefaultData() {
        if (confirm('ATENÇÃO: Isso irá apagar TODOS os seus dados atuais (produtos, vendas, clientes) e restaurar os dados padrão. Essa ação não pode ser desfeita. Deseja continuar?')) {
            produtos = [...DEFAULT_PRODUTOS];
            vendas = [...DEFAULT_VENDAS];
            clientes = [...DEFAULT_CLIENTES];
            saveAll();
            alert('Dados restaurados com sucesso!');
            renderCurrentView('dashboard');
        }
    }

    // ========== LOGIN ==========
    const loginOverlay = document.getElementById('loginOverlay');
    const appContainer = document.getElementById('appContainer');
    const loginMsg = document.getElementById('loginMessage');

    function updateAvatarDisplay() {
        const avatarDiv = document.getElementById('userAvatar');
        if (currentSession && currentSession.avatarImage && currentSession.avatarImage.startsWith('data:image')) {
            avatarDiv.style.backgroundImage = `url(${currentSession.avatarImage})`;
            avatarDiv.style.backgroundSize = 'cover';
            avatarDiv.style.backgroundPosition = 'center';
            avatarDiv.innerText = '';
        } else {
            avatarDiv.style.backgroundImage = '';
            avatarDiv.innerText = currentSession ? currentSession.avatar : 'U';
        }
    }

    function loginUser(email, password) {
        const user = users.find(u => u.email === email);
        if (!user) { loginMsg.innerText = "E-mail não cadastrado. Crie uma conta."; return false; }
        if (user.password !== password) { loginMsg.innerText = "Senha incorreta."; return false; }
        currentSession = { name: user.name, email: user.email, avatar: user.name.charAt(0).toUpperCase(), avatarImage: user.avatarImage || null };
        saveAll();
        updateAvatarDisplay();
        document.getElementById('userNameDisplay').innerText = currentSession.name;
        loginOverlay.style.display = 'none';
        appContainer.classList.add('visible');
        applyTheme();
        renderCurrentView('dashboard');
        closeSidebar();
        return true;
    }

    function signupUser(name, email, password) {
        if (!name || !email || !password) { loginMsg.innerText = "Preencha todos os campos."; return false; }
        if (users.find(u => u.email === email)) { loginMsg.innerText = "E-mail já cadastrado. Faça login."; return false; }
        users.push({ name, email, password, avatarImage: null });
        saveAll();
        currentSession = { name, email, avatar: name.charAt(0).toUpperCase(), avatarImage: null };
        saveAll();
        updateAvatarDisplay();
        document.getElementById('userNameDisplay').innerText = currentSession.name;
        loginOverlay.style.display = 'none';
        appContainer.classList.add('visible');
        applyTheme();
        renderCurrentView('dashboard');
        closeSidebar();
        return true;
    }

        updateAvatarDisplay();
        document.getElementById('userNameDisplay').innerText = currentSession.name;
        renderCurrentView('dashboard');
    }

    document.getElementById('logoutBtn').onclick = () => {

        saveAll();
        loginOverlay.style.display = 'flex';
        appContainer.classList.remove('visible');

        document.getElementById('loginEmail').value = '';

    // ========== DASHBOARD COM FATURAMENTO E LUCRO DO MÊS ATUAL ==========
    let dailyChart = null, marginChart = null, productPieChart = null;
    function renderDashboard() {
        const hoje = new Date();
        const mesAtual = hoje.getMonth();
        const anoAtual = hoje.getFullYear();
        
        // Faturamento e Lucro do Mês Atual
        const faturamentoMesAtual = vendas.filter(v => {
            const dataVenda = new Date(v.data);
            return dataVenda.getMonth() === mesAtual && dataVenda.getFullYear() === anoAtual;
        }).reduce((s, v) => s + v.total, 0);
        
        const lucroMesAtual = vendas.filter(v => {
            const dataVenda = new Date(v.data);
            return dataVenda.getMonth() === mesAtual && dataVenda.getFullYear() === anoAtual;
        }).reduce((acc, v) => {
            const p = produtos.find(prod => prod.id === v.produtoId);
            return acc + (p ? v.quantidade * (p.venda - p.custo) : 0);
        }, 0);
        
        // Demais indicadores
        const totalFaturamento = vendas.reduce((s, v) => s + v.total, 0);
        const totalLucro = vendas.reduce((acc, v) => {
            const p = produtos.find(prod => prod.id === v.produtoId);
            return acc + (p ? v.quantidade * (p.venda - p.custo) : 0);
        }, 0);
        const ticketMedio = vendas.length ? totalFaturamento / vendas.length : 0;
        const produtosEstoque = produtos.reduce((s, p) => s + p.estoque, 0);
        const alertasCount = produtos.filter(p => p.estoque <= p.estoqueMin).length;
        
        // Gráficos
        const ultimos30Dias = Array.from({ length: 30 }, (_, i) => {
            const d = new Date();
            d.setDate(hoje.getDate() - (29 - i));
            return d.toISOString().slice(0, 10);
        });
        const vendasPorDia = ultimos30Dias.map(dia => 
            vendas.filter(v => v.data.startsWith(dia)).reduce((s, v) => s + v.total, 0)
        );
        
        const produtosMargem = produtos.map(p => ({
            nome: p.nome,
            margem: p.venda ? ((p.venda - p.custo) / p.venda * 100).toFixed(1) : 0
        })).sort((a, b) => b.margem - a.margem).slice(0, 5);
        
        const receitaPorProduto = {};
        vendas.forEach(v => {
            receitaPorProduto[v.produtoId] = (receitaPorProduto[v.produtoId] || 0) + v.total;
        });
        const sortedProdutos = Object.entries(receitaPorProduto).sort((a, b) => b[1] - a[1]).slice(0, 5);
        const pieLabels = sortedProdutos.map(([id]) => {
            const p = produtos.find(pr => pr.id == id);
            return p ? p.nome : 'Desconhecido';
        });
        const pieData = sortedProdutos.map(([, valor]) => valor);
        
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div class="grid-stats">
                <div class="stat-card"><i class="fas fa-chart-line"></i><h3>Faturamento Total</h3><p>${formatMoney(totalFaturamento)}</p></div>
                <div class="stat-card"><i class="fas fa-coins"></i><h3>Lucro Total</h3><p>${formatMoney(totalLucro)}</p></div>
                <div class="stat-card"><i class="fas fa-ticket-alt"></i><h3>Ticket Médio</h3><p>${formatMoney(ticketMedio)}</p></div>
                <div class="stat-card"><i class="fas fa-boxes"></i><h3>Estoque Total</h3><p>${produtosEstoque}</p></div>
                <div class="stat-card"><i class="fas fa-exclamation-triangle"></i><h3>Alertas Baixo Estoque</h3><p>${alertasCount}</p></div>
                <div class="stat-card"><i class="fas fa-calendar-alt"></i><h3>Faturamento do Mês</h3><p>${formatMoney(faturamentoMesAtual)}</p><small>${hoje.toLocaleString('pt-BR', { month: 'long', year: 'numeric' })}</small></div>
                <div class="stat-card"><i class="fas fa-chart-simple"></i><h3>Lucro do Mês</h3><p>${formatMoney(lucroMesAtual)}</p><small>${hoje.toLocaleString('pt-BR', { month: 'long', year: 'numeric' })}</small></div>
            </div>
            <div class="charts-row">
                <div class="chart-box"><h4>📈 Evolução Diária (últimos 30 dias)</h4><div class="chart-container"><canvas id="dailyChartCanvas"></canvas></div></div>
                <div class="chart-box"><h4>💰 Margem por Produto (Top 5)</h4><div class="chart-container"><canvas id="marginChartCanvas"></canvas></div></div>
            </div>
            <div class="charts-row">
                <div class="chart-box"><h4>🥧 Faturamento por Produto (Top 5)</h4><div class="chart-container"><canvas id="pieChartCanvas"></canvas></div></div>
                <div class="chart-box"><h4>📊 Indicadores Rápidos</h4><div style="padding:20px"><p><strong>Vendas realizadas:</strong> ${vendas.length}</p><p><strong>Produtos diferentes vendidos:</strong> ${new Set(vendas.map(v => v.produtoId)).size}</p><p><strong>Lucratividade média:</strong> ${totalFaturamento ? ((totalLucro / totalFaturamento) * 100).toFixed(1) : 0}%</p><p><strong>Clientes cadastrados:</strong> ${clientes.length}</p></div></div>
            </div>
            <div class="chart-box"><h4>📊 Últimas 5 Vendas</h4><div class="table-responsive"><table style="width:100%"><thead><tr><th>Produto</th><th>Valor</th><th>Data</th></tr></thead><tbody>${vendas.slice(-5).reverse().map(v => {
                const p = produtos.find(pr => pr.id === v.produtoId);
                return `<tr><td>${p?.nome || '-'}</td><td>${formatMoney(v.total)}</td><td>${new Date(v.data).toLocaleDateString()}</td></tr>`;
            }).join('')}</tbody></table></div></div>
        `;
        
        setTimeout(() => {
            const ctxDaily = document.getElementById('dailyChartCanvas')?.getContext('2d');
            if (ctxDaily) {
                if (dailyChart) dailyChart.destroy();
                dailyChart = new Chart(ctxDaily, {
                    type: 'line',
                    data: {
                        labels: ultimos30Dias.map(d => d.slice(5)),
                        datasets: [{
                            label: 'Faturamento Diário (R$)',
                            data: vendasPorDia,
                            borderColor: '#3b82f6',
                            tension: 0.3,
                            fill: true,
                            backgroundColor: 'rgba(59,130,246,0.1)'
                        }]
                    },
                    options: { responsive: true }
                });
            }
            const ctxMargin = document.getElementById('marginChartCanvas')?.getContext('2d');
            if (ctxMargin) {
                if (marginChart) marginChart.destroy();
                marginChart = new Chart(ctxMargin, {
                    type: 'bar',
                    data: {
                        labels: produtosMargem.map(p => p.nome),
                        datasets: [{
                            label: 'Margem (%)',
                            data: produtosMargem.map(p => p.margem),
                            backgroundColor: '#10b981'
                        }]
                    }
                });
            }
            const ctxPie = document.getElementById('pieChartCanvas')?.getContext('2d');
            if (ctxPie) {
                if (productPieChart) productPieChart.destroy();
                productPieChart = new Chart(ctxPie, {
                    type: 'doughnut',
                    data: {
                        labels: pieLabels,
                        datasets: [{
                            data: pieData,
                            backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444']
                        }]
                    }
                });
            }
        }, 100);
    }

    function renderVenda() {
        const clientesOptions = clientes.map(c => `<option value="${c.id}">${c.nome}</option>`).join('');
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div class="card-premium">
                <div class="card-title"><i class="fas fa-shopping-cart"></i> Nova Venda</div>
                <div class="form-group"><label>Cliente</label><select id="clienteVenda">${clientesOptions}<option value="novo">+ Novo Cliente</option></select>

                <div class="form-group"><label>Produto</label><select id="produtoVenda"></select></div>
                <div id="produtoInfo" class="produto-info-card" style="display:none;"></div>
                
                <div class="flex-row">
                    <div class="form-group"><label>Quantidade</label><input type="number" id="qtdVenda" min="1" value="1"></div>
                    <div class="form-group"><label>Preço Unitário (R$)</label><input type="number" id="precoUnitario" step="0.01" placeholder="Preço negociado"></div>
                    <div class="form-group"><label>Data</label><input type="date" id="dataVenda" value="${new Date().toISOString().slice(0,10)}"></div>
                </div>
                
                <div class="form-group"><label>Forma de Pagamento</label><select id="formaPagamento"><option>Dinheiro</option><option>Cartão Crédito</option><option>Pix</option><option>Boleto</option></select></div>
                
                <div class="flex-row" style="justify-content: space-between; align-items: center;">
                    <div><strong style="font-size:1.2rem;">Total: <span id="totalPreview">R$ 0,00</span></strong></div>
                    <div class="flex-row" style="gap:12px;">
                        <button id="calcularBtn" class="btn-primary" style="background:var(--info)"><i class="fas fa-calculator"></i> Calcular</button>
                        <button id="venderBtn" class="btn-primary"><i class="fas fa-check"></i> Registrar Venda</button>
                    </div>
                </div>
                <div id="vendaMsg" style="margin-top:20px;"></div>
            </div>
        `;
        
        const productSelect = document.getElementById('produtoVenda');
        const qtdInput = document.getElementById('qtdVenda');
        const precoInput = document.getElementById('precoUnitario');
        const totalSpan = document.getElementById('totalPreview');
        
        function updateProductSelect() {
            productSelect.innerHTML = produtos.map(p => `<option value="${p.id}" data-price="${p.venda}" data-stock="${p.estoque}">${p.nome} - ${formatMoney(p.venda)} (estoque: ${p.estoque})</option>`).join('');
        }
        updateProductSelect();
        
        function updateProductInfo() {
            const selected = productSelect.options[productSelect.selectedIndex];
            const price = selected?.dataset.price;
            const stock = selected?.dataset.stock;
            const infoDiv = document.getElementById('produtoInfo');
            infoDiv.style.display = 'block';
            infoDiv.innerHTML = `<strong>${selected?.text.split(' - ')[0]}</strong><br>💰 Preço padrão: ${formatMoney(price)}<br>📦 Estoque disponível: ${stock}<br><small><i class="fas fa-edit"></i> Você pode alterar o preço acima</small>`;
            if (!precoInput.value) precoInput.value = price;
            updateTotalPreview();
        }
        
        function updateTotalPreview() {
            const qtd = parseInt(qtdInput.value) || 0;
            const preco = parseFloat(precoInput.value) || 0;
            totalSpan.innerText = formatMoney(qtd * preco);
        }
        
        productSelect.addEventListener('change', updateProductInfo);
        qtdInput.addEventListener('input', updateTotalPreview);
        precoInput.addEventListener('input', updateTotalPreview);
        
        document.getElementById('calcularBtn').onclick = () => updateTotalPreview();
        
        document.getElementById('clienteVenda').addEventListener('change', (e) => {
            document.getElementById('novoClienteFields').style.display = e.target.value === 'novo' ? 'block' : 'none';
        });
        
        document.getElementById('salvarNovoCliente').onclick = () => {
            const nome = document.getElementById('novoClienteNome').value.trim();
            if (!nome) return alert('Nome obrigatório');
            const email = document.getElementById('novoClienteEmail').value.trim();
            const telefone = document.getElementById('novoClienteTelefone').value.trim();
            const novoId = Date.now();
            clientes.push({ id: novoId, nome, email, telefone });
            saveAll();
            const select = document.getElementById('clienteVenda');
            select.add(new Option(nome, novoId));
            select.value = novoId;
            document.getElementById('novoClienteFields').style.display = 'none';
            alert('Cliente cadastrado!');
        };
        
        document.getElementById('venderBtn').onclick = () => {
            let clienteId = parseInt(document.getElementById('clienteVenda').value);
            if (isNaN(clienteId)) clienteId = null;
            const prodId = parseInt(productSelect.value);
            const qtd = parseInt(qtdInput.value);
            const precoVenda = parseFloat(precoInput.value);
            const dataVenda = document.getElementById('dataVenda').value;
            const formaPagamento = document.getElementById('formaPagamento').value;
            const prod = produtos.find(p => p.id === prodId);
            
            if (!prod || qtd <= 0) return alert('Selecione produto e quantidade válida');
            if (qtd > prod.estoque) return alert(`Estoque insuficiente. Disponível: ${prod.estoque}`);
            if (!precoVenda || precoVenda <= 0) return alert('Informe um preço unitário válido');
            
            prod.estoque -= qtd;
            const total = qtd * precoVenda;
            vendas.push({ 
                id: Date.now(), 
                produtoId: prodId, 
                quantidade: qtd, 
                total, 
                data: new Date(dataVenda).toISOString(), 
                clienteId, 
                formaPagamento, 
                precoUnitario: precoVenda 
            });
            saveAll();
            document.getElementById('vendaMsg').innerHTML = `<div class="badge-success" style="padding:12px;">✅ Venda realizada! Total ${formatMoney(total)}</div>`;
            setTimeout(() => renderVenda(), 1500);
        };
        
        updateProductInfo();
    }

    // ========== DEMAIS FUNÇÕES (estoque, relatórios, etc) ==========
    function renderEstoque() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `<div class="card-premium"><div class="card-title"><i class="fas fa-edit"></i> Gestão de Estoque</div><div class="search-box"><input type="text" id="searchEstoque" placeholder="🔍 Buscar..."><button id="novoProdutoBtn" class="btn-primary"><i class="fas fa-plus"></i> Novo Produto</button></div><div class="table-responsive"><table style="min-width:700px;"><thead><tr><th>Cód.</th><th>Descrição</th><th>Preço Venda</th><th>Margem</th><th>Estoque</th><th>Mín</th><th>Máx</th><th>Ações</th></tr></thead><tbody id="estoqueTableBody"></tbody></table></div></div>`;
        function renderTable(filter='') {
            const filtered = produtos.filter(p => p.nome.toLowerCase().includes(filter.toLowerCase()) || (p.codigoInterno||'').toLowerCase().includes(filter));
            document.getElementById('estoqueTableBody').innerHTML = filtered.map(p => { const margem = p.venda > 0 ? ((p.venda - p.custo)/p.venda*100).toFixed(1) : 0; return `<tr><td>${p.codigoInterno||'-'}</td><td><strong>${p.nome}</strong><br><small>${p.codigoBarras||''}</small></td><td>${formatMoney(p.venda)}</td><td><span class="badge ${margem>30?'badge-success':margem>15?'badge-warning':''}">${margem}%</span></td><td><span class="badge ${p.estoque<=p.estoqueMin?'badge-warning':'badge-success'}">${p.estoque}</span></td><td>${p.estoqueMin}</td><td>${p.estoqueMax}</td><td><button class="editProd" data-id="${p.id}" style="background:none; border:none; color:var(--primary); cursor:pointer;"><i class="fas fa-pen"></i></button> <button class="delProd" data-id="${p.id}" style="background:none; border:none; color:var(--danger); cursor:pointer;"><i class="fas fa-trash"></i></button></td></tr>`; }).join('');
            document.querySelectorAll('.editProd').forEach(btn => btn.addEventListener('click', () => openProdutoModal(parseInt(btn.dataset.id))));
            document.querySelectorAll('.delProd').forEach(btn => btn.addEventListener('click', () => { if(confirm('Excluir produto?')) { produtos = produtos.filter(p => p.id != btn.dataset.id); saveAll(); renderEstoque(); } }));
        }
        document.getElementById('searchEstoque').addEventListener('input', (e) => renderTable(e.target.value));
        document.getElementById('novoProdutoBtn').onclick = () => openProdutoModal();
        renderTable();
    }
    
    function renderRelatorioVendas() {
        const totalGeral = vendas.reduce((s,v)=>s+v.total,0);
        document.getElementById('mainContent').innerHTML = `<div class="card-premium"><div class="card-title">📈 Relatório de Vendas</div><div class="table-responsive"><table style="min-width:800px;"><thead><tr><th>Produto</th><th>Qtd</th><th>Preço Unit.</th><th>Cliente</th><th>Data</th><th>Pagamento</th><th>Total</th></tr></thead><tbody>${vendas.map(v => { const p = produtos.find(prod=>prod.id===v.produtoId); const cli = v.clienteId ? clientes.find(c=>c.id===v.clienteId) : null; return `<tr><td>${p?.nome||'-'}</td><td>${v.quantidade}</td><td>${formatMoney(v.precoUnitario || p?.venda || 0)}</td><td>${cli ? cli.nome : 'Não cadastrado'}</td><td>${new Date(v.data).toLocaleString()}</td><td>${v.formaPagamento || '-'}</td><td>${formatMoney(v.total)}</td></tr>`; }).join('')}</tbody></table></div><div style="margin-top:20px;"><strong>Total Geral: ${formatMoney(totalGeral)}</strong></div></div>`;
    }
    
    function renderRelatorioMensal() {
        const porMes = {};
        vendas.forEach(v => { const d = new Date(v.data); const chave = `${d.getMonth()+1}/${d.getFullYear()}`; porMes[chave] = (porMes[chave] || 0) + v.total; });
        let html = `<div class="card-premium"><div class="card-title">📅 Relatório Mensal</div><div class="table-responsive"><table style="min-width:300px;"><thead><tr><th>Mês/Ano</th><th>Faturamento</th></tr></thead><tbody>`;
        for (let [mes, total] of Object.entries(porMes)) html += `<tr><td>${mes}</td><td>${formatMoney(total)}</td></tr>`;
        html += `</tbody></table></div></div>`;
        document.getElementById('mainContent').innerHTML = html;
    }
    
    function renderAlertas() {
        const alertas = produtos.filter(p => p.estoque <= p.estoqueMin);
        document.getElementById('mainContent').innerHTML = `<div class="card-premium"><div class="card-title">⚠️ Alertas de Estoque</div>${alertas.length ? alertas.map(p => `<div class="badge-warning" style="margin:8px 0; padding:12px;">⚠️ ${p.nome} estoque: ${p.estoque} (mín: ${p.estoqueMin})</div>`).join('') : '<p>✅ Nenhum alerta</p>'}</div>`;
    }
    
    function renderHistorico() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `<div class="card-premium"><div class="card-title">📜 Histórico de Vendas</div><div class="search-box"><input type="text" id="filterHistorico" placeholder="🔍 Buscar..."></div><div class="table-responsive"><table style="min-width:800px;"><thead><tr><th>Produto</th><th>Qtd</th><th>Preço Unit.</th><th>Cliente</th><th>Data</th><th>Pagamento</th><th>Total</th></tr></thead><tbody id="historicoBody"></tbody></table></div><button id="limparHistoricoBtn" class="btn-danger"><i class="fas fa-trash"></i> Limpar Histórico</button></div>`;
        function renderHistory(filter='') {
            const filtered = vendas.filter(v => { const p = produtos.find(p=>p.id===v.produtoId); const cli = v.clienteId ? clientes.find(c=>c.id===v.clienteId) : null; return p?.nome.toLowerCase().includes(filter.toLowerCase()) || (cli?.nome.toLowerCase().includes(filter.toLowerCase()) || false); }).reverse();
            document.getElementById('historicoBody').innerHTML = filtered.map(v => { const p = produtos.find(prod=>prod.id===v.produtoId); const cli = v.clienteId ? clientes.find(c=>c.id===v.clienteId) : null; return `<tr><td>${p?.nome||'-'}</td><td>${v.quantidade}</td><td>${formatMoney(v.precoUnitario || p?.venda || 0)}</td><td>${cli ? cli.nome : 'Não cadastrado'}</td><td>${new Date(v.data).toLocaleString()}</td><td>${v.formaPagamento || '-'}</td><td>${formatMoney(v.total)}</td></tr>`; }).join('');
        }
        document.getElementById('filterHistorico')?.addEventListener('input', (e) => renderHistory(e.target.value));
        document.getElementById('limparHistoricoBtn')?.addEventListener('click', () => { if(confirm('Apagar todas as vendas?')) { vendas = []; saveAll(); renderHistorico(); renderDashboard(); } });
        renderHistory();
    }
    
    function renderClientes() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `<div class="card-premium"><div class="card-title"><i class="fas fa-users"></i> Clientes</div><button id="novoClienteBtn" class="btn-primary" style="margin-bottom:20px"><i class="fas fa-plus"></i> Novo Cliente</button><div class="table-responsive"><table style="min-width:400px;"><thead><tr><th>Nome</th><th>E-mail</th><th>Telefone</th><th>Ações</th></tr></thead><tbody>${clientes.map(c => `<tr><td>${c.nome}</td><td>${c.email||'-'}</td><td>${c.telefone||'-'}</td><td><button class="delCliente" data-id="${c.id}" style="background:none; border:none; color:var(--danger); cursor:pointer;"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody></table></div></div>`;
        document.getElementById('novoClienteBtn')?.addEventListener('click', () => { const nome = prompt('Nome:'); if(nome){ const email = prompt('E-mail:'); const telefone = prompt('Telefone:'); clientes.push({ id: Date.now(), nome, email: email||'', telefone: telefone||'' }); saveAll(); renderClientes(); } });
        document.querySelectorAll('.delCliente').forEach(btn => btn.addEventListener('click', () => { if(confirm('Remover?')) { clientes = clientes.filter(c => c.id != btn.dataset.id); saveAll(); renderClientes(); } }));
    }
    
    function renderConfiguracoes() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div class="card-premium">
                <div class="card-title"><i class="fas fa-cog"></i> Configurações do Sistema</div>
                <div style="margin-bottom: 20px;">
                    <h3 style="margin-bottom: 15px;">⚠️ Área de Risco</h3>
                    <p style="margin-bottom: 20px; color: var(--danger);">Abaixo você pode restaurar os dados padrão do sistema. Isso irá apagar todos os seus produtos, vendas e clientes atuais.</p>
                    <button id="resetDataBtn" class="btn-danger" style="padding: 12px 24px;"><i class="fas fa-trash-alt"></i> Restaurar Dados Padrão</button>
                </div>
                <hr style="margin: 20px 0; border-color: var(--border-color);">
                <div>
                    <h3 style="margin-bottom: 15px;">ℹ️ Informações</h3>
                    <p><strong>Versão:</strong> 2.0.0</p>
                    <p><strong>Desenvolvido para:</strong> Gestão Inteligente de Vendas</p>
                    <p><strong>Armazenamento:</strong> Local (os dados ficam salvos no seu navegador)</p>
                </div>
            </div>
        `;
        document.getElementById('resetDataBtn')?.addEventListener('click', () => resetToDefaultData());
    }
    
    function renderCurrentView(view) {
        if (view === 'dashboard') renderDashboard();
        else if (view === 'estoque') renderEstoque();
        else if (view === 'venda') renderVenda();
        else if (view === 'relatorioVendas') renderRelatorioVendas();
        else if (view === 'relatorioMensal') renderRelatorioMensal();
        else if (view === 'alertas') renderAlertas();
        else if (view === 'historico') renderHistorico();
        else if (view === 'clientes') renderClientes();
        else if (view === 'configuracoes') renderConfiguracoes();
        setActiveMenuItem(view);
        refreshSidebarEvents();
    }
    
    refreshSidebarEvents();
    setActiveMenuItem('dashboard');
</script>
</body>
</html>
