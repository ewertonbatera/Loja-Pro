<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Loja Pro - Gestão Inteligente Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            padding: 24px;
            transition: background 0.3s, color 0.2s;
        }
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fc 0%, #eef2f8 100%);
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
            --header-bg: #ffffff;
            --sidebar-bg: #ffffff;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #8b5cf6;
            --shadow-sm: 0 10px 25px -5px rgba(0,0,0,0.05);
            --shadow-md: 0 20px 25px -5px rgba(0,0,0,0.05);
            --backdrop-bg: rgba(0,0,0,0.3);
            --menu-icon-color: #1e293b;
        }
        body.dark {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #1e293b;
            --text-color: #e2e8f0;
            --border-color: #334155;
            --header-bg: #1e293b;
            --sidebar-bg: #0f172a;
            --shadow-sm: 0 10px 25px -5px rgba(0,0,0,0.3);
            --backdrop-bg: rgba(0,0,0,0.6);
            --menu-icon-color: #ffffff;
        }
        
        /* Login */
        .login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient); display: flex; align-items: center;
            justify-content: center; z-index: 1000;
        }
        .login-card {
            background: var(--card-bg); border-radius: 48px; padding: 48px 40px;
            width: 90%; max-width: 440px; box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .login-card h2 {
            font-size: 2rem; font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--info));
            -webkit-background-clip: text; background-clip: text; color: transparent;
            margin-bottom: 32px;
        }
        .login-card .input-group { margin-bottom: 20px; text-align: left; }
        .login-card .input-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .login-card .input-group input {
            width: 100%; padding: 14px 18px;
            border-radius: 60px; border: 1px solid var(--border-color);
            background: var(--card-bg); color: var(--text-color);
            font-size: 1rem;
        }
        .login-card button {
            width: 100%; padding: 14px; background: var(--primary);
            color: white; font-weight: 600; border: none;
            border-radius: 60px; cursor: pointer; font-size: 1rem;
            margin-top: 12px;
        }
        .login-card .register-link { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border-color); }
        .login-card .register-link span { color: var(--primary); cursor: pointer; font-weight: 600; }
        .login-message { margin-top: 16px; font-size: 0.85rem; color: var(--danger); }
        
        /* App */
        .app-container { display: none; }
        .app-container.visible { display: block; }
        
        /* Header */
        .main-header {
            background: var(--header-bg); border-radius: 60px; padding: 12px 28px;
            margin-bottom: 32px; display: flex; align-items: center;
            justify-content: space-between; flex-wrap: wrap; gap: 16px;
            box-shadow: var(--shadow-sm); border: 1px solid var(--border-color);
        }
        .menu-btn {
            background: var(--card-bg); border: 1px solid var(--border-color);
            font-size: 24px; cursor: pointer; width: 48px; height: 48px;
            border-radius: 40px; display: flex; align-items: center;
            justify-content: center; color: var(--menu-icon-color);
        }
        .page-title {
            font-size: 1.4rem; font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--info));
            -webkit-background-clip: text; background-clip: text; color: transparent;
            flex-grow: 1; text-align: center;
        }
        .right-area { display: flex; gap: 16px; align-items: center; }
        .user-area {
            display: flex; align-items: center; gap: 12px;
            background: var(--card-bg); padding: 6px 20px 6px 12px;
            border-radius: 60px; border: 1px solid var(--border-color);
        }
        .avatar {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--primary), var(--info));
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: white; font-weight: bold;
        }
        .theme-toggle, .logout-btn {
            background: var(--card-bg); border: 1px solid var(--border-color);
            padding: 10px 18px; border-radius: 40px; cursor: pointer;
        }
        .logout-btn { background: var(--danger); color: white; border: none; }
        
        /* Sidebar */
        .sidebar-backdrop {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--backdrop-bg); z-index: 98; display: none;
        }
        .sidebar-backdrop.active { display: block; }
        .sidebar {
            position: fixed; top: 0; left: 0; width: 300px; height: 100%;
            background: var(--sidebar-bg); transform: translateX(-100%);
            transition: transform 0.3s; z-index: 99; padding: 100px 0 32px;
            border-right: 1px solid var(--border-color);
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar ul { list-style: none; padding: 0 20px; }
        .sidebar li {
            margin: 12px 0; padding: 14px 20px; border-radius: 60px;
            cursor: pointer; display: flex; align-items: center; gap: 14px;
            transition: 0.2s;
        }
        .sidebar li:hover { background: var(--primary); color: white; }
        
        /* Conteúdo */
        .main-content { min-height: 600px; }
        .card {
            background: var(--card-bg); border-radius: 32px; padding: 28px;
            margin-bottom: 28px; box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }
        .card-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; margin-bottom: 32px; }
        .stat-card { background: var(--card-bg); border-radius: 28px; padding: 24px; text-align: center; border: 1px solid var(--border-color); }
        .stat-card i { font-size: 2.5rem; color: var(--primary); margin-bottom: 12px; }
        .stat-card h3 { font-size: 1rem; font-weight: 500; opacity: 0.8; }
        .stat-card p { font-size: 2rem; font-weight: 700; margin-top: 8px; }
        .charts-row { display: flex; flex-wrap: wrap; gap: 24px; margin-bottom: 32px; }
        .chart-box { flex: 1; min-width: 280px; background: var(--card-bg); border-radius: 28px; padding: 20px; border: 1px solid var(--border-color); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { color: var(--primary); }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 60px; font-size: 0.75rem; font-weight: 600; }
        .badge-success { background: var(--success); color: white; }
        .badge-warning { background: var(--warning); color: #1e293b; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border-radius: 16px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--backdrop-bg); align-items: center; justify-content: center; z-index: 200; }
        .modal.active { display: flex; }
        .modal-content { background: var(--card-bg); border-radius: 32px; padding: 32px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
        .flex-row { display: flex; gap: 16px; flex-wrap: wrap; }
        .flex-row .form-group { flex: 1; }
        @media (max-width: 700px) { body { padding: 16px; } .main-header { flex-direction: column; } .right-area { justify-content: flex-end; } }
    </style>
</head>
<body>

<!-- Login -->
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2><i class="fas fa-store"></i> Loja Pro</h2>
        <div class="input-group"><label>E-mail</label><input type="email" id="loginEmail" placeholder="seu@email.com"></div>
        <div class="input-group"><label>Senha</label><input type="password" id="loginPassword" placeholder="••••••"></div>
        <button id="doLoginBtn">Entrar</button>
        <div class="register-link">Não tem uma conta? <span id="showRegisterBtn">Cadastre-se</span></div>
        <div id="loginMessage" class="login-message"></div>
    </div>
</div>

<div id="registerOverlay" class="login-overlay" style="display: none;">
    <div class="login-card">
        <h2><i class="fas fa-user-plus"></i> Criar Conta</h2>
        <div class="input-group"><label>Nome</label><input type="text" id="regName" placeholder="Seu nome completo"></div>
        <div class="input-group"><label>E-mail</label><input type="email" id="regEmail" placeholder="seu@email.com"></div>
        <div class="input-group"><label>Senha</label><input type="password" id="regPassword" placeholder="Mínimo 3 caracteres"></div>
        <div class="input-group"><label>Confirmar Senha</label><input type="password" id="regConfirmPassword" placeholder="Digite a senha novamente"></div>
        <button id="doRegisterBtn">Cadastrar</button>
        <div class="register-link">Já tem uma conta? <span id="showLoginBtn">Faça login</span></div>
        <div id="registerMessage" class="login-message"></div>
    </div>
</div>

<div id="appContainer" class="app-container">
    <div class="main-header">
        <button class="menu-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="page-title"><i class="fas fa-chart-line"></i> Loja Pro • Gestão Inteligente</div>
        <div class="right-area">
            <div class="user-area"><div class="avatar" id="userAvatar">U</div><span id="userNameDisplay"></span></div>
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>
            <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sair</button>
        </div>
    </div>
    <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
    <div class="sidebar" id="sidebar">
        <ul>
            <li onclick="showDashboard()"><i class="fas fa-tachometer-alt"></i> Dashboard</li>
            <li onclick="showEstoque()"><i class="fas fa-boxes"></i> Estoque</li>
            <li onclick="showVenda()"><i class="fas fa-cash-register"></i> Nova Venda</li>
            <li onclick="showRelatorioVendas()"><i class="fas fa-chart-bar"></i> Relatório Vendas</li>
            <li onclick="showRelatorioMensal()"><i class="fas fa-calendar-alt"></i> Relatório Mensal</li>
            <li onclick="showAlertas()"><i class="fas fa-bell"></i> Alertas</li>
            <li onclick="showHistorico()"><i class="fas fa-history"></i> Histórico</li>
            <li onclick="showClientes()"><i class="fas fa-users"></i> Clientes</li>
        </ul>
    </div>
    <div class="main-content" id="mainContent"></div>
</div>

<script>
    function formatarMoeda(valor) {
        return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    // Dados
    let users = JSON.parse(localStorage.getItem('lojapro_users')) || [];
    let produtos = JSON.parse(localStorage.getItem('lojapro_produtos')) || [];
    let vendas = JSON.parse(localStorage.getItem('lojapro_vendas')) || [];
    let clientes = JSON.parse(localStorage.getItem('lojapro_clientes')) || [];
    let currentSession = JSON.parse(localStorage.getItem('lojapro_session')) || null;

    function saveAll() {
        localStorage.setItem('lojapro_users', JSON.stringify(users));
        localStorage.setItem('lojapro_produtos', JSON.stringify(produtos));
        localStorage.setItem('lojapro_vendas', JSON.stringify(vendas));
        localStorage.setItem('lojapro_clientes', JSON.stringify(clientes));
        if (currentSession) localStorage.setItem('lojapro_session', JSON.stringify(currentSession));
        else localStorage.removeItem('lojapro_session');
    }

    // Dados iniciais
    if (produtos.length === 0) {
        produtos = [
            { id: 1, nome: "Smartphone X", descricao: "Smartphone de última geração", codigoBarras: "7891234567890", precoCompra: 800, precoVenda: 1299, estoque: 8, estoqueMin: 3, estoqueMax: 40, dataEntrada: "2025-01-15" },
            { id: 2, nome: "Fone Bluetooth Pro", descricao: "Fone com cancelamento de ruído", codigoBarras: "7891234567891", precoCompra: 45, precoVenda: 149, estoque: 15, estoqueMin: 5, estoqueMax: 60, dataEntrada: "2025-02-10" },
            { id: 3, nome: "Carregador Turbo", descricao: "Carregador rápido 65W", codigoBarras: "7891234567892", precoCompra: 28, precoVenda: 79, estoque: 3, estoqueMin: 4, estoqueMax: 30, dataEntrada: "2025-01-20" },
            { id: 4, nome: "Smartwatch", descricao: "Relógio inteligente com GPS", codigoBarras: "7891234567893", precoCompra: 150, precoVenda: 299, estoque: 6, estoqueMin: 2, estoqueMax: 25, dataEntrada: "2025-03-01" }
        ];
        saveAll();
    }
    
    if (vendas.length === 0 && produtos.length > 0) {
        vendas = [
            { id: Date.now(), produtoId: 1, quantidade: 2, total: 2 * 1299, data: new Date().toISOString(), clienteId: null, formaPagamento: "Dinheiro" },
            { id: Date.now()+1, produtoId: 2, quantidade: 5, total: 5 * 149, data: new Date().toISOString(), clienteId: null, formaPagamento: "Cartão" }
        ];
        saveAll();
    }
    
    if (clientes.length === 0) {
        clientes = [
            { id: 1, nome: "João Silva", email: "joao@email.com", telefone: "11999999999" },
            { id: 2, nome: "Maria Oliveira", email: "maria@email.com", telefone: "11988888888" }
        ];
        saveAll();
    }

    // Login
    const loginOverlay = document.getElementById('loginOverlay');
    const registerOverlay = document.getElementById('registerOverlay');
    const appContainer = document.getElementById('appContainer');

    document.getElementById('showRegisterBtn').onclick = () => { loginOverlay.style.display = 'none'; registerOverlay.style.display = 'flex'; };
    document.getElementById('showLoginBtn').onclick = () => { registerOverlay.style.display = 'none'; loginOverlay.style.display = 'flex'; };
    
    document.getElementById('doLoginBtn').onclick = () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const user = users.find(u => u.email === email);
        if (!user) { document.getElementById('loginMessage').innerText = "E-mail não cadastrado"; return; }
        if (user.password !== password) { document.getElementById('loginMessage').innerText = "Senha incorreta"; return; }
        currentSession = { name: user.name, email: user.email, avatar: user.name.charAt(0).toUpperCase() };
        saveAll();
        document.getElementById('userAvatar').innerText = currentSession.avatar;
        document.getElementById('userNameDisplay').innerText = currentSession.name;
        loginOverlay.style.display = 'none';
        appContainer.classList.add('visible');
        showDashboard();
        closeSidebar();
    };
    
    document.getElementById('doRegisterBtn').onclick = () => {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const confirm = document.getElementById('regConfirmPassword').value.trim();
        if (!name || !email || !password || !confirm) { document.getElementById('registerMessage').innerText = "Preencha todos os campos"; return; }
        if (password.length < 3) { document.getElementById('registerMessage').innerText = "Senha mínima 3 caracteres"; return; }
        if (password !== confirm) { document.getElementById('registerMessage').innerText = "Senhas não coincidem"; return; }
        if (users.find(u => u.email === email)) { document.getElementById('registerMessage').innerText = "E-mail já cadastrado"; return; }
        users.push({ name, email, password });
        saveAll();
        document.getElementById('registerMessage').innerText = "Cadastro realizado! Faça login.";
        setTimeout(() => { registerOverlay.style.display = 'none'; loginOverlay.style.display = 'flex'; }, 1500);
    };
    
    if (currentSession) {
        loginOverlay.style.display = 'none';
        appContainer.classList.add('visible');
        document.getElementById('userAvatar').innerText = currentSession.avatar;
        document.getElementById('userNameDisplay').innerText = currentSession.name;
        showDashboard();
    }
    
    document.getElementById('logoutBtn').onclick = () => {
        currentSession = null;
        saveAll();
        loginOverlay.style.display = 'flex';
        registerOverlay.style.display = 'none';
        appContainer.classList.remove('visible');
    };
    
    // Menu
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    const backdrop = document.getElementById('sidebarBackdrop');
    function openSidebar() { sidebar.classList.add('open'); backdrop.classList.add('active'); menuToggle.innerHTML = '<i class="fas fa-times"></i>'; }
    function closeSidebar() { sidebar.classList.remove('open'); backdrop.classList.remove('active'); menuToggle.innerHTML = '<i class="fas fa-bars"></i>'; }
    menuToggle.onclick = () => { if (sidebar.classList.contains('open')) closeSidebar(); else openSidebar(); };
    backdrop.onclick = closeSidebar;
    
    // Tema
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    function applyTheme() { const dark = localStorage.getItem('theme') === 'dark'; if(dark) body.classList.add('dark'); else body.classList.remove('dark'); themeToggle.innerHTML = dark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>'; }
    themeToggle.onclick = () => { body.classList.toggle('dark'); localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light'); applyTheme(); };
    applyTheme();

    let salesChart = null, topProductsChart = null;

    // Funções Globais do Menu
    window.showDashboard = function() { renderDashboard(); closeSidebar(); };
    window.showEstoque = function() { renderEstoque(); closeSidebar(); };
    window.showVenda = function() { renderVenda(); closeSidebar(); };
    window.showRelatorioVendas = function() { renderRelatorioVendas(); closeSidebar(); };
    window.showRelatorioMensal = function() { renderRelatorioMensal(); closeSidebar(); };
    window.showAlertas = function() { renderAlertas(); closeSidebar(); };
    window.showHistorico = function() { renderHistorico(); closeSidebar(); };
    window.showClientes = function() { renderClientes(); closeSidebar(); };

    function renderDashboard() {
        const main = document.getElementById('mainContent');
        const totalFaturamento = vendas.reduce((s,v) => s + v.total, 0);
        let lucroTotal = 0;
        for (const venda of vendas) {
            const produto = produtos.find(p => p.id === venda.produtoId);
            if (produto) lucroTotal += venda.total - (venda.quantidade * produto.precoCompra);
        }
        const baixoEstoque = produtos.filter(p => p.estoque <= p.estoqueMin).length;
        const vendasPorMes = {};
        vendas.forEach(v => { const mes = new Date(v.data).toLocaleString('default', { month: 'short', year:'numeric' }); vendasPorMes[mes] = (vendasPorMes[mes] || 0) + v.total; });
        const labels = Object.keys(vendasPorMes);
        const valores = Object.values(vendasPorMes);
        
        main.innerHTML = `
            <div class="grid-stats">
                <div class="stat-card"><i class="fas fa-chart-line"></i><h3>Faturamento</h3><p>${formatarMoeda(totalFaturamento)}</p></div>
                <div class="stat-card"><i class="fas fa-coins"></i><h3>Lucro Líquido</h3><p>${formatarMoeda(lucroTotal)}</p></div>
                <div class="stat-card"><i class="fas fa-boxes"></i><h3>Produtos em Estoque</h3><p>${produtos.reduce((s,p)=>s+p.estoque,0)}</p></div>
                <div class="stat-card"><i class="fas fa-exclamation-triangle"></i><h3>Alertas</h3><p>${baixoEstoque}</p></div>
            </div>
            <div class="charts-row"><div class="chart-box"><canvas id="monthlySalesChart"></canvas></div><div class="chart-box"><canvas id="topProductsChart"></canvas></div></div>
            <div class="card"><div class="card-title">Últimas Vendas</div><table><thead><tr><th>Produto</th><th>Qtd</th><th>Total</th><th>Data</th></tr></thead><tbody>
            ${vendas.slice(-5).reverse().map(v => { const p = produtos.find(prod=>prod.id===v.produtoId); return `<tr><td>${p?p.nome:'-'}</td><td>${v.quantidade}</td><td>${formatarMoeda(v.total)}</td><td>${new Date(v.data).toLocaleDateString()}</td></tr>`; }).join('')}
            </tbody></table></div>
        `;
        setTimeout(() => {
            const ctx1 = document.getElementById('monthlySalesChart')?.getContext('2d');
            if(ctx1) { if(salesChart) salesChart.destroy(); salesChart = new Chart(ctx1, { type: 'bar', data: { labels, datasets: [{ label: 'Faturamento', data: valores, backgroundColor: '#3b82f6' }] }, options: { responsive: true } }); }
        }, 100);
    }

    function renderEstoque() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div class="card"><div class="card-title">Gestão de Estoque</div>
            <button class="btn-primary" onclick="abrirModalProduto()" style="margin-bottom:20px"><i class="fas fa-plus"></i> Novo Produto</button>
            <table><thead><tr><th>Produto</th><th>Preço Compra</th><th>Preço Venda</th><th>Estoque</th><th>Mín</th><th>Máx</th><th>Ações</th></tr></thead><tbody>
            ${produtos.map(p => `<tr><td><strong>${p.nome}</strong><br><small>${p.codigoBarras || ''}</small></td><td>${formatarMoeda(p.precoCompra)}</td><td>${formatarMoeda(p.precoVenda)}</td><td><span class="badge ${p.estoque<=p.estoqueMin?'badge-warning':'badge-success'}">${p.estoque}</span></td><td>${p.estoqueMin}</td><td>${p.estoqueMax}</td><td><button class="btn-primary" onclick="editarProduto(${p.id})"><i class="fas fa-pen"></i></button> <button class="btn-primary" style="background:var(--danger)" onclick="excluirProduto(${p.id})"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
            </tbody></table></div>
        `;
    }

    window.abrirModalProduto = function(produto = null) {
        const isEditing = produto !== null;
        const modal = document.createElement('div');
        modal.className = 'modal active';
        modal.innerHTML = `<div class="modal-content"><h3>${isEditing ? 'Editar' : 'Novo'} Produto</h3>
            <div class="form-group"><label>Nome</label><input type="text" id="prodNome" value="${produto ? produto.nome : ''}"></div>
            <div class="form-group"><label>Descrição</label><textarea id="prodDescricao" rows="2">${produto ? (produto.descricao || '') : ''}</textarea></div>
            <div class="flex-row"><div class="form-group"><label>Código Barras</label><input type="text" id="prodCodigo" value="${produto ? (produto.codigoBarras || '') : ''}"></div>
            <div class="form-group"><label>Data Entrada</label><input type="date" id="prodData" value="${produto ? (produto.dataEntrada || new Date().toISOString().slice(0,10)) : new Date().toISOString().slice(0,10)}"></div></div>
            <div class="flex-row"><div class="form-group"><label>Preço Compra</label><input type="number" id="prodCompra" step="0.01" value="${produto ? produto.precoCompra : ''}"></div>
            <div class="form-group"><label>Preço Venda</label><input type="number" id="prodVenda" step="0.01" value="${produto ? produto.precoVenda : ''}"></div></div>
            <div class="flex-row"><div class="form-group"><label>Estoque</label><input type="number" id="prodEstoque" value="${produto ? produto.estoque : '0'}"></div>
            <div class="form-group"><label>Estoque Mín</label><input type="number" id="prodMin" value="${produto ? produto.estoqueMin : '0'}"></div>
            <div class="form-group"><label>Estoque Máx</label><input type="number" id="prodMax" value="${produto ? produto.estoqueMax : '0'}"></div></div>
            <div style="display:flex; gap:12px; margin-top:20px;"><button class="btn-primary" id="salvarProduto">Salvar</button><button id="fecharModal" style="background:var(--danger); color:white; border:none; padding:12px; border-radius:40px;">Cancelar</button></div>
        </div>`;
        document.body.appendChild(modal);
        document.getElementById('fecharModal').onclick = () => modal.remove();
        document.getElementById('salvarProduto').onclick = () => {
            const nome = document.getElementById('prodNome').value.trim();
            if(!nome) return alert('Nome obrigatório');
            const precoVenda = parseFloat(document.getElementById('prodVenda').value);
            if(isNaN(precoVenda)) return alert('Preço venda inválido');
            if(isEditing) {
                produto.nome = nome;
                produto.descricao = document.getElementById('prodDescricao').value;
                produto.codigoBarras = document.getElementById('prodCodigo').value;
                produto.dataEntrada = document.getElementById('prodData').value;
                produto.precoCompra = parseFloat(document.getElementById('prodCompra').value) || 0;
                produto.precoVenda = precoVenda;
                produto.estoque = parseInt(document.getElementById('prodEstoque').value) || 0;
                produto.estoqueMin = parseInt(document.getElementById('prodMin').value) || 0;
                produto.estoqueMax = parseInt(document.getElementById('prodMax').value) || 0;
            } else {
                produtos.push({ id: Date.now(), nome, descricao: document.getElementById('prodDescricao').value, codigoBarras: document.getElementById('prodCodigo').value, dataEntrada: document.getElementById('prodData').value, precoCompra: parseFloat(document.getElementById('prodCompra').value) || 0, precoVenda: precoVenda, estoque: parseInt(document.getElementById('prodEstoque').value) || 0, estoqueMin: parseInt(document.getElementById('prodMin').value) || 0, estoqueMax: parseInt(document.getElementById('prodMax').value) || 0 });
            }
            saveAll();
            modal.remove();
            renderEstoque();
        };
    };
    
    window.editarProduto = function(id) { const produto = produtos.find(p => p.id === id); if(produto) abrirModalProduto(produto); };
    window.excluirProduto = function(id) { if(confirm('Excluir produto?')) { produtos = produtos.filter(p => p.id !== id); saveAll(); renderEstoque(); } };

    function renderVenda() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `
            <div class="card"><div class="card-title">Nova Venda</div>
            <div class="form-group"><label>Cliente</label><select id="clienteVenda"><option value="">-- Selecione --</option>${clientes.map(c => `<option value="${c.id}">${c.nome}</option>`).join('')}<option value="novo">+ Novo Cliente</option></select></div>
            <div class="form-group"><label>Produto</label><select id="produtoVenda">${produtos.map(p => `<option value="${p.id}">${p.nome} - ${formatarMoeda(p.precoVenda)} (${p.estoque} un)</option>`).join('')}</select></div>
            <div class="form-group"><label>Quantidade</label><input type="number" id="qtdVenda" value="1" min="1"></div>
            <div class="form-group"><label>Forma Pagamento</label><select id="formaPagamento"><option>Dinheiro</option><option>Cartão</option><option>Pix</option></select></div>
            <button class="btn-primary" id="venderBtn">Registrar Venda</button>
            <div id="vendaMsg" style="margin-top:20px;"></div></div>
        `;
        document.getElementById('venderBtn').onclick = () => {
            const clienteId = parseInt(document.getElementById('clienteVenda').value);
            const prodId = parseInt(document.getElementById('produtoVenda').value);
            const qtd = parseInt(document.getElementById('qtdVenda').value);
            const prod = produtos.find(p => p.id === prodId);
            if(!prod) return alert('Selecione produto');
            if(qtd > prod.estoque) return alert('Estoque insuficiente');
            prod.estoque -= qtd;
            const total = qtd * prod.precoVenda;
            vendas.push({ id: Date.now(), produtoId: prodId, quantidade: qtd, total, data: new Date().toISOString(), clienteId: isNaN(clienteId) ? null : clienteId, formaPagamento: document.getElementById('formaPagamento').value });
            saveAll();
            document.getElementById('vendaMsg').innerHTML = `<div class="badge-success" style="padding:12px;">✅ Venda realizada! Total ${formatarMoeda(total)}</div>`;
            setTimeout(() => renderVenda(), 1500);
        };
    }

    function renderRelatorioVendas() {
        const total = vendas.reduce((s,v)=>s+v.total,0);
        document.getElementById('mainContent').innerHTML = `<div class="card"><div class="card-title">Relatório de Vendas</div> table<thead><tr><th>Produto</th><th>Qtd</th><th>Data</th><th>Total</th></tr></thead><tbody>${vendas.map(v => { const p = produtos.find(prod=>prod.id===v.produtoId); return `<tr><td>${p?p.nome:'-'}</td><td>${v.quantidade}</td><td>${new Date(v.data).toLocaleDateString()}</td><td>${formatarMoeda(v.total)}</td></tr>`; }).join('')}</tbody></table><p><strong>Total: ${formatarMoeda(total)}</strong></p></div>`;
    }

    function renderRelatorioMensal() {
        const meses = {};
        vendas.forEach(v => { const d = new Date(v.data); const chave = `${d.getMonth()+1}/${d.getFullYear()}`; meses[chave] = (meses[chave]||0)+v.total; });
        let html = `<div class="card"><div class="card-title">Relatório Mensal</div> table<thead><tr><th>Mês</th><th>Total</th></tr></thead><tbody>`;
        for(let [mes, total] of Object.entries(meses)) html += `<tr><td>${mes}</td><td>${formatarMoeda(total)}</td></tr>`;
        html += `</tbody></table></div>`;
        document.getElementById('mainContent').innerHTML = html;
    }

    function renderAlertas() {
        const alertas = produtos.filter(p => p.estoque <= p.estoqueMin);
        document.getElementById('mainContent').innerHTML = `<div class="card"><div class="card-title">Alertas de Estoque</div>${alertas.length ? alertas.map(p => `<div class="badge-warning" style="margin:10px 0; padding:12px;">⚠️ ${p.nome}: ${p.estoque} un (mínimo: ${p.estoqueMin})</div>`).join('') : '<p>✅ Nenhum alerta</p>'}</div>`;
    }

    function renderHistorico() {
        const items = vendas.slice().reverse().map(v => { const p = produtos.find(prod=>prod.id===v.produtoId); return `<li>📌 ${p?.nome} - ${v.quantidade} un - ${formatarMoeda(v.total)} - ${new Date(v.data).toLocaleString()}</li>`; });
        document.getElementById('mainContent').innerHTML = `<div class="card"><div class="card-title">Histórico</div><ul>${items.join('')}</ul></div>`;
    }

    function renderClientes() {
        document.getElementById('mainContent').innerHTML = `<div class="card"><div class="card-title">Clientes</div><button class="btn-primary" onclick="novoCliente()" style="margin-bottom:20px"><i class="fas fa-plus"></i> Novo Cliente</button> table<thead><tr><th>Nome</th><th>Email</th><th>Telefone</th></tr></thead><tbody>${clientes.map(c => `<tr><td>${c.nome}</td><td>${c.email||'-'}</td><td>${c.telefone||'-'}</td></tr>`).join('')}</tbody></table></div>`;
    }
    window.novoCliente = function() {
        const nome = prompt('Nome do cliente:'); if(nome) { clientes.push({ id: Date.now(), nome, email: prompt('Email:')||'', telefone: prompt('Telefone:')||'' }); saveAll(); renderClientes(); }
    };
</script>
</body>
</html>
